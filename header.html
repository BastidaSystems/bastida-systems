<style>
  #site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    width: 100%;
    background: #ffffff;
  }

  #site-header .bs-header {
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    width: 100%;
    min-height: 64px;
    padding: 0.75rem 1.75rem;
    border-bottom: 1px solid #e5e7eb;
    background: #ffffff;
    color: #111827;
    font-family: 'Manrope', Arial, sans-serif;
  }

  #site-header .bs-brand {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    flex: 0 0 auto;
    color: #000000;
    text-decoration: none;
  }

  #site-header .bs-menu-toggle {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
    padding: 0;
    white-space: nowrap;
  }

  #site-header .bs-menu-button {
    display: none;
    width: 2.35rem;
    height: 2.35rem;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.3rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    color: #111827;
    cursor: pointer;
  }

  #site-header .bs-menu-button span {
    display: block;
    width: 1.1rem;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
  }

  #site-header .bs-brand img {
    display: block;
    width: auto;
    height: 28px;
    object-fit: contain;
  }

  #site-header .bs-brand-text {
    font-size: 0.86rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #site-header .bs-nav {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 1.35rem;
    min-width: 0;
    color: #4b5563;
    font-size: 0.78rem;
    font-weight: 650;
    line-height: 1;
    white-space: nowrap;
  }

  #site-header .bs-nav a {
    color: inherit;
    text-decoration: none;
    transition: color 160ms ease;
  }

  #site-header .bs-nav a:hover {
    color: #000000;
  }

  #site-header .language-picker {
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    width: 7.25rem;
    min-height: 2.25rem;
    padding: 0.25rem 0.35rem 0.25rem 0.65rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    color: #6b7280;
    font-size: 0.7rem;
    font-weight: 800;
    line-height: 1;
    text-transform: uppercase;
  }

  #site-header .language-picker select {
    width: 3.5rem;
    min-height: 1.75rem;
    border: 0;
    border-radius: 6px;
    background: #111827;
    color: #ffffff;
    font: inherit;
    font-weight: 900;
    cursor: pointer;
  }

  @media (max-width: 767px) {
    #site-header .bs-header {
      display: grid;
      grid-template-columns: 2.75rem 1fr 4.25rem;
      justify-items: center;
      align-items: center;
      gap: 0.55rem;
      min-height: 0;
      padding: 0.75rem 0.85rem;
    }

    #site-header .bs-brand {
      justify-content: center;
    }

    #site-header .bs-menu-button {
      display: inline-flex;
    }

    #site-header .bs-brand-text,
    #site-header .language-picker span {
      display: none;
    }

    #site-header .bs-nav {
      position: absolute;
      left: 0.85rem;
      top: calc(100% + 0.5rem);
      display: none;
      width: 13rem;
      max-width: calc(100vw - 1.7rem);
      flex-direction: column;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      font-size: 0.92rem;
      line-height: 1.2;
    }

    #site-header .bs-menu-toggle:checked ~ .bs-nav {
      display: flex;
    }

    #site-header .language-picker {
      width: auto;
      min-height: 2.05rem;
      padding: 0.22rem;
      flex: 0 0 auto;
    }
  }

  @media print {
    #site-header {
      position: static;
    }

    #site-header .bs-header {
      position: static;
    }
  }
</style>

<nav class="bs-header" aria-label="Bastida Systems navigation">
  <input id="bs-mobile-menu-toggle" class="bs-menu-toggle" type="checkbox" aria-label="Open navigation menu">
  <label for="bs-mobile-menu-toggle" class="bs-menu-button" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <a href="index.html" class="bs-brand">
    <img src="img/logo_bastida_sys.png" alt="Bastida Systems Logo">
    <span class="bs-brand-text">Bastida Systems LLC</span>
  </a>

  <div class="bs-nav site-menu-links">
    <a href="index.html" data-i18n="nav.home">Home</a>
    <a href="industries.html" data-i18n="nav.industries">Industries</a>
    <a href="about.html" data-i18n="nav.aboutUs">About Us</a>
    <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
    <a href="login.html" data-i18n="nav.login">Login</a>
    <label class="language-picker">
      <span data-i18n="nav.language">Language</span>
      <select id="language-select" aria-label="Language selector" data-i18n-aria-label="nav.languageSelector">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    </label>
  </div>
</nav>
