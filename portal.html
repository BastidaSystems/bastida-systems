      }

      function renderAddToProjectModal() {
        const person = buildPeople().find((item) => item.userId === state.addProject.userId);
        const projects = person ? addableProjectsForPerson(person) : [];
        const notice = state.addProject.message
          ? `<div class="notice notice-${state.addProject.type === 'error' ? 'error' : 'success'}">${escapeHtml(state.addProject.message)}</div>`
          : '';
        const noProjectsNotice = projects.length
          ? ''
          : '<div class="notice">This collaborator is already assigned to every project you can manage.</div>';

        return `
          <div class="modal-backdrop" role="presentation">
            <section class="modal" role="dialog" aria-modal="true" aria-labelledby="add-project-title">
              <form data-add-project-form>
                <div class="modal-header">
                  <div>
                    <h2 class="modal-title" id="add-project-title">Add Collaborator to Project</h2>
                    <p class="modal-copy">Assign an existing portal collaborator without creating a new user.</p>
                  </div>
                  <button class="button" type="button" data-close-add-project>Close</button>
                </div>
                <div class="modal-body">
                  ${notice}
                  ${noProjectsNotice}
                  <div class="detail-grid">
                    ${detailCard('Collaborator', person?.name || '-')}
                    ${detailCard('Email', person?.email || '-')}
                  </div>
                  <div class="form-grid form-grid-spaced">
                    <div class="field">
                      <label for="add-project-project">Project</label>
                      <select id="add-project-project" name="project_id" required>
                        ${projects.length
                          ? projects.map((project) => `<option value="${escapeAttr(project.id)}">${escapeHtml(project.name)}</option>`).join('')
                          : '<option value="">No available projects</option>'}
                      </select>
                    </div>
                    <div class="field">
                      <label for="add-project-role">System Role</label>
                      <select id="add-project-role" name="role" required>
                        ${renderSystemRoleOptions('contractor')}
                      </select>
                    </div>
                    <div class="field">
                      <label for="add-project-title-input">Project Title / Position optional</label>
                      <input id="add-project-title-input" name="project_title" type="text" autocomplete="organization-title" placeholder="Marketing Specialist, Lead Artist, Creative Director">
                      <p class="field-hint">Shown visually per project. Permissions still use the System Role.</p>
                    </div>
                    <div class="field">
                      <label for="add-project-rate">Hourly rate optional</label>
                      <input id="add-project-rate" name="hourly_rate_usd" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00">
                    </div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="button" type="button" data-close-add-project>Cancel</button>
                  <button class="button button-primary" type="submit" ${state.addProject.isSubmitting || !person?.userId || !projects.length ? 'disabled' : ''}>
                    ${state.addProject.isSubmitting ? 'Adding collaborator' : 'Add to Project'}
                  </button>
                </div>
              </form>
            </section>
          </div>
        `;
      }

      function renderProjectTeamModal() {
        const project = state.projects.find((item) => item.id === state.projectTeam.projectId);
        if (!project) {
          return '';
        }

        const rows = projectTeamRows(project.id);
        const canManage = canManageProject(project.id);
        const groups = projectTeamRoleGroups()
          .map((group) => ({
            ...group,
            rows: rows.filter((row) => group.roles.includes(row.role))
          }))
          .filter((group) => group.rows.length);

        return `
          <div class="modal-backdrop" role="presentation">
            <section class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="project-team-title">
              <div class="modal-header">
                <div>
                  <h2 class="modal-title" id="project-team-title">Project Team &mdash; ${escapeHtml(project.name)}</h2>
                  <p class="modal-copy">Active collaborators grouped by project role.</p>
                </div>
                <button class="button" type="button" data-close-project-team>Close</button>
              </div>
              <div class="modal-body">
                ${groups.length ? groups.map((group) => renderProjectTeamGroup(group, project)).join('') : emptyState('No active collaborators', 'Active project roles will appear here after real collaborators are assigned.', true)}
              </div>
              <div class="modal-footer">
                <div class="section-actions">
                  <button class="button" type="button" data-project-team-open-team="${escapeAttr(project.id)}">Open in Team</button>
                  ${canManage ? `<button class="button button-primary" type="button" data-project-team-add="${escapeAttr(project.id)}">Add Collaborator</button>` : ''}
                  <button class="button" type="button" data-project-team-organization="${escapeAttr(project.id)}">View Organization Tree</button>
                </div>
              </div>
            </section>
          </div>
        `;
      }

      function renderProjectTeamGroup(group, project) {
        return `
          <section class="detail-card detail-card-spaced">
            <p class="project-team-group-title">${escapeHtml(group.label)}</p>
            <div class="detail-card-body table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Collaborator</th>
                    <th>System Role</th>
                    <th>Project Title / Position</th>
                    <th>Approved Hours</th>
                    <th>Total Earned</th>
                    <th>Completed Deliverables</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${group.rows.map((row) => `
                    <tr>
                      <td>
                        <span class="cell-title">${escapeHtml(row.name)}</span>
                        <span class="cell-subtitle truncate" title="${escapeAttr(row.email || 'No email')}">${escapeHtml(row.email || 'No email')}</span>
                      </td>
                      <td>
                        <span class="cell-title">${escapeHtml(roleLabel(row.role))}</span>
                        <span class="cell-subtitle truncate" title="${escapeAttr(project.name)}">${escapeHtml(project.name)}</span>
                      </td>
                      <td>${escapeHtml(row.projectTitle || '-')}</td>
                      <td>${formatHours(row.approvedHours)}h approved</td>
                      <td>${formatMoney(row.totalEarned)}</td>
                      <td>${row.completedDeliverables}</td>
                      <td>${statusPill(row.status)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderDetailsModal() {
        if (state.detail.kind === 'collaborator') {
          return renderCollaboratorDrawer();
        }

        const detail = buildDetailContent();

        return `
          <div class="modal-backdrop" role="presentation">
            <section class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="details-title">
              <div class="modal-header">
                <div>
                  <h2 class="modal-title" id="details-title">${escapeHtml(detail.title)}</h2>
                  <p class="modal-copy">${escapeHtml(detail.copy)}</p>
                </div>
                <button class="button" type="button" data-close-detail>Close</button>
              </div>
              <div class="modal-body">
                ${detail.body}
              </div>
              <div class="modal-footer">
                <button class="button button-primary" type="button" data-close-detail>Done</button>
              </div>
            </section>
          </div>
        `;
      }

      function renderCollaboratorDrawer() {
        const person = buildPeople().find((item) => item.userId === state.detail.id);

        if (!person) {
          const detail = emptyDetail();
          return `
            <div class="modal-backdrop" role="presentation">
              <section class="modal" role="dialog" aria-modal="true" aria-labelledby="details-title">
                <div class="modal-header">
                  <h2 class="modal-title" id="details-title">${escapeHtml(detail.title)}</h2>
                  <button class="button" type="button" data-close-detail>Close</button>
                </div>
                <div class="modal-body">${detail.body}</div>
              </section>
            </div>
          `;
        }

        const activeAssignments = allActiveAssignmentsForPerson(person);
        const canAddToProject = addableProjectsForPerson(person).length > 0;
        const projectBreakdown = buildCollaboratorProjectBreakdown(person.userId);
        const recentDocuments = visibleDocuments()
          .filter((document) => documentRelatedToPerson(document, person.userId))
          .sort((a, b) => compareDateDesc(a.created_at, b.created_at))
          .slice(0, 4);
        const recentActivity = buildCollaboratorActivity(person).slice(0, 6);
        const recentLogs = visibleWorkLogs()
          .filter((log) => log.worker_user_id === person.userId)
          .sort((a, b) => compareDateDesc(a.submitted_at || a.work_date, b.submitted_at || b.work_date))
          .slice(0, 4);

        return `
          <div class="drawer-backdrop" role="presentation">
            <aside class="profile-drawer" role="dialog" aria-modal="true" aria-labelledby="collaborator-title">
              <div class="drawer-header">
                <div class="drawer-identity">
                  <span class="avatar">${escapeHtml(initials(person.name || person.email))}</span>
                  <div class="org-node-body">
                    <h2 class="modal-title" id="collaborator-title">${escapeHtml(person.name)}</h2>
                    <p class="modal-copy">${escapeHtml(person.email || 'No email available')}</p>
                    <p class="modal-copy">${escapeHtml(roleSummaryForAssignments(activeAssignments, person))}</p>
                  </div>
                </div>
                <div class="section-actions">
                  ${canAddToProject ? `<button class="button button-primary" type="button" data-open-add-project="${escapeAttr(person.userId)}">+ Add to Project</button>` : ''}
                  <button class="button" type="button" data-close-detail>Close</button>
                </div>
              </div>
              <div class="drawer-body">
                <div class="detail-grid">
                  ${detailCard('Approved Hours', formatHours(person.approvedHours))}
                  ${detailCard('Total Earned', formatMoney(person.totalEarned))}
                  ${detailCard('Deliverables Completed', person.completedDeliverables)}
                  ${detailCard('Tasks Completed', person.completedTasks)}
                  ${detailCard('Last Activity', formatDate(person.lastActivity))}
                </div>
                <section class="drawer-section">
                  <p class="drawer-section-title">Active Roles</p>
                  ${renderAssignmentStack(activeAssignments, person)}
                </section>
                <section class="drawer-section">
                  <p class="drawer-section-title">Approved Hours / Earned by Project</p>
                  ${projectBreakdown.length ? renderMiniList(projectBreakdown.map((item) => ({
                    title: item.projectName,
                    meta: `${formatHours(item.approvedHours)} approved hours - ${formatMoney(item.totalEarned)} earned`
                  }))) : '<p class="empty-copy empty-copy-flush">No approved hours by project yet.</p>'}
                </section>
                <section class="drawer-section">
                  <p class="drawer-section-title">Documents</p>
                  ${recentDocuments.length ? renderMiniList(recentDocuments.map((document) => ({
                    title: document.name,
                    meta: `${formatDate(document.created_at)} - ${documentProjectLabel(document)} - ${statusLabel(document.category)}`,
                    status: document.status
                  }))) : '<p class="empty-copy empty-copy-flush">No documents related to this collaborator.</p>'}
                </section>
                <section class="drawer-section">
                  <p class="drawer-section-title">Recent Activity</p>
                  ${recentActivity.length ? renderMiniList(recentActivity) : '<p class="empty-copy empty-copy-flush">No recent activity for this collaborator.</p>'}
                </section>
                <section class="drawer-section">
                  <p class="drawer-section-title">Latest Work Logs</p>
                  ${recentLogs.length ? renderMiniList(recentLogs.map((log) => ({
                    title: log.title || 'Work log',
                    meta: `${formatDate(log.work_date)} - ${log.project?.name || 'Unassigned'} - ${formatHours(log.hours_used)} submitted / ${log.status === 'approved' ? formatHours(log.approved_hours) : '-'} approved`,
                    status: log.status
                  }))) : '<p class="empty-copy empty-copy-flush">No work logs for this collaborator.</p>'}
                </section>
              </div>
            </aside>
          </div>
        `;
      }

      function buildDetailContent() {
        if (['payment-error', 'task-error', 'document-error'].includes(state.detail.kind)) {
          const titles = {
            'payment-error': 'Payment action failed',
            'task-error': 'Task action failed',
            'document-error': 'Document action failed'
          };

          return {
            title: titles[state.detail.kind],
            copy: 'Supabase returned an error while updating the record.',
            body: `<div class="notice notice-error">${escapeHtml(state.detail.id || 'Unknown payment error.')}</div>`
          };
        }

        if (state.detail.kind === 'collaborator') {
          const person = buildPeople().find((item) => item.userId === state.detail.id);
          if (!person) {
            return emptyDetail();
          }

          return {
            title: person.name,
            copy: roleSummaryForAssignments(person.assignments, person),
            body: renderCollaboratorDetail(person)
          };
        }

        if (state.detail.kind === 'project') {
          const project = state.projects.find((item) => item.id === state.detail.id);
          if (!project) {
            return emptyDetail();
          }

          return {
            title: project.name,
            copy: project.description || project.slug || 'Project operating details.',
            body: renderProjectDetail(project)
          };
        }

        if (state.detail.kind === 'work-log') {
          const log = state.workLogs.find((item) => item.id === state.detail.id);
          if (!log) {
            return emptyDetail();
          }

          return {
            title: log.title || 'Work Log',
            copy: `${formatDate(log.work_date)} - ${log.project?.name || 'Unassigned'}`,
            body: renderWorkLogDetail(log)
          };
        }

        if (state.detail.kind === 'deliverable') {
          const deliverable = state.deliverables.find((item) => item.id === state.detail.id);
          if (!deliverable) {
            return emptyDetail();
          }

          return {
            title: deliverable.title,
            copy: `${deliverable.project?.name || 'Unassigned'} - ${statusLabel(deliverable.status)}`,
            body: renderDeliverableDetail(deliverable)
          };
        }

        if (state.detail.kind === 'task') {
          const task = state.tasks.find((item) => item.id === state.detail.id);
          if (!task) {
            return emptyDetail();
          }

          return {
            title: task.title,
            copy: `${task.project?.name || 'Unassigned'} - ${statusLabel(task.status)}`,
            body: renderTaskDetail(task)
          };
        }

        if (state.detail.kind === 'document') {
          const document = state.documents.find((item) => item.id === state.detail.id);
          if (!document) {
            return emptyDetail();
          }

          return {
            title: document.name,
            copy: `${documentProjectLabel(document)} - ${documentScopeLabel(documentScopeValue(document))}`,
            body: renderDocumentDetail(document)
          };
        }

        if (state.detail.kind === 'payment') {
          const payment = findPayableRow(state.detail.id);
          if (!payment) {
            return emptyDetail();
          }

          return {
            title: `${payment.collaborator?.full_name || payment.collaborator?.email || 'Collaborator'} payment`,
            copy: `${payment.project?.name || 'Unassigned'} - ${statusLabel(payment.payment_status || payment.status)}`,
            body: renderPaymentDetail(payment)
          };
        }

        return emptyDetail();
      }

      function emptyDetail() {
        return {
          title: 'Details unavailable',
          copy: 'The selected record is no longer available in the current Supabase result set.',
          body: emptyState('Record not found', 'Refresh the portal and try again.', true)
        };
      }

      function renderCollaboratorDetail(person) {
        const activeAssignments = allActiveAssignmentsForPerson(person);
        const activeRoles = uniqueValues(
          activeAssignments.map((assignment) => assignment.role).filter(Boolean).concat(person.roles || [])
        );
        const projectNames = uniqueValues(
          activeAssignments.map((assignment) => assignment.project?.name).filter(Boolean).concat(person.projectNames || [])
        );

        return `
          <div class="detail-grid">
            ${detailCard('Name', person.name)}
            ${detailCard('Email', person.email || '-')}
            ${detailCard('Role', roleSummaryForAssignments(activeAssignments, person))}
            ${detailCard('Active Roles', activeRoles.map(roleLabel).join(', ') || '-')}
            ${detailCard('Projects', projectNames.join(', ') || '-')}
            ${detailCard('Approved Hours', formatHours(person.approvedHours))}
            ${detailCard('Total Earned', formatMoney(person.totalEarned))}
            ${detailCard('Deliverables Completed', person.completedDeliverables)}
            ${detailCard('Tasks Completed', person.completedTasks)}
            ${detailCard('Last Activity', formatDate(person.lastActivity))}
          </div>
        `;
      }

      function renderProjectDetail(project) {
        const collaboratorCount = projectTeamCollaboratorCount(project.id);
        const logs = state.workLogs.filter((log) => log.project_id === project.id);
        const deliverables = state.deliverables.filter((deliverable) => deliverable.project_id === project.id);
        const approvedHours = logs
          .filter((log) => log.status === 'approved')
          .reduce((total, log) => total + toNumber(log.approved_hours), 0);

        return `
          <div class="detail-grid">
            ${detailCard('Status', statusLabel(project.status))}
            ${projectTeamDetailCard(project, collaboratorCount)}
            ${detailCard('Approved Hours', formatHours(approvedHours))}
            ${detailCard('Deliverables', deliverables.length)}
            ${detailCard('Slug', project.slug || '-')}
            ${detailCard('Updated', formatDate(project.updated_at || project.created_at))}
          </div>
        `;
      }

      function projectTeamDetailCard(project, collaboratorCount) {
        return `
          <div class="detail-card">
            <p class="detail-label">Collaborators</p>
            <button class="inline-link-button detail-value-button" type="button" data-open-project-team="${escapeAttr(project.id)}" aria-label="Open project team for ${escapeAttr(project.name)}">
              ${collaboratorCount}
            </button>
          </div>
        `;
      }

      function renderWorkLogDetail(log) {
        return `
          <div class="detail-grid">
            ${detailCard('Project', log.project?.name || 'Unassigned')}
            ${detailCard('Worker', log.worker?.full_name || log.worker?.email || 'Unknown')}
            ${detailCard('Work Type', log.work_type || log.category || '-')}
            ${detailCard('Date', formatDate(log.work_date))}
            ${detailCard('Submitted Hours', formatHours(log.hours_used))}
            ${detailCard('Approved Hours', log.status === 'approved' ? formatHours(log.approved_hours) : '-')}
            ${detailCard('Status', statusLabel(log.status))}
            ${detailCard('Commit', log.commit_hash || '-')}
            ${detailCard('Approver', log.approver?.full_name || log.approver?.email || '-')}
            ${detailCard('Rejected By', log.rejecter?.full_name || log.rejecter?.email || '-')}
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Description</p>
            <p class="detail-value">${escapeHtml(log.description || '-')}</p>
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Evidence</p>
            <p class="detail-value">${log.evidence_url ? `<a href="${escapeAttr(log.evidence_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(log.evidence_url)}</a>` : '-'}</p>
          </div>
        `;
      }

      function renderDeliverableDetail(deliverable) {
        return `
          <div class="detail-grid">
            ${detailCard('Project', deliverable.project?.name || 'Unassigned')}
            ${detailCard('Responsible', deliverable.responsible?.full_name || deliverable.responsible?.email || '-')}
            ${detailCard('Due Date', formatDate(deliverable.due_date))}
            ${detailCard('Status', statusLabel(deliverable.status))}
            ${detailCard('Delivered', formatDate(deliverable.delivered_at))}
            ${detailCard('Approved', formatDate(deliverable.approved_at))}
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Progress</p>
            <div class="detail-card-body">${renderProgressBar(deliverableProgress(deliverable.status))}</div>
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Description</p>
            <p class="detail-value">${escapeHtml(deliverable.description || '-')}</p>
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Evidence Links</p>
            <div class="detail-card-body">${renderEvidenceLinks(deliverable)}</div>
          </div>
        `;
      }

      function renderTaskDetail(task) {
        return `
          <div class="detail-grid">
            ${detailCard('Project', task.project?.name || 'Unassigned')}
            ${detailCard('Assigned To', task.assignee?.full_name || task.assignee?.email || '-')}
            ${detailCard('Priority', statusLabel(task.priority))}
            ${detailCard('Status', statusLabel(task.status))}
            ${detailCard('Due Date', formatDate(task.due_date))}
            ${detailCard('Completed', formatDate(task.completed_at))}
            ${detailCard('Created By', task.creator?.full_name || task.creator?.email || '-')}
            ${detailCard('Completed By', task.completer?.full_name || task.completer?.email || '-')}
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Description</p>
            <p class="detail-value">${escapeHtml(task.description || '-')}</p>
          </div>
        `;
      }

      function renderDocumentDetail(document) {
        const url = document.document_url || document.storage_path || '';

        return `
          <div class="detail-grid">
            ${detailCard('Scope', documentScopeLabel(documentScopeValue(document)))}
            ${detailCard('Project', documentProjectLabel(document))}
            ${detailCard('Related Collaborator', documentRelatedUserLabel(document))}
            ${detailCard('Category', statusLabel(document.category))}
            ${detailCard('Status', statusLabel(document.status))}
            ${detailCard('Uploaded By', document.uploader?.full_name || document.uploader?.email || '-')}
            ${detailCard('Updated', formatDate(document.updated_at || document.created_at))}
            ${detailCard('Archived', formatDate(document.archived_at))}
            ${detailCard('Archived By', document.archiver?.full_name || document.archiver?.email || '-')}
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Document Link</p>
            <p class="detail-value">${url ? `<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>` : '-'}</p>
          </div>
        `;
      }

      function renderPaymentDetail(payment) {
        const history = payment.payment_id
          ? state.paymentHistory.filter((item) => item.payment_id === payment.payment_id)
          : [];

        return `
          <div class="detail-grid">
            ${detailCard('Collaborator', payment.collaborator?.full_name || payment.collaborator?.email || 'Unassigned')}
            ${detailCard('Project', payment.project?.name || 'Unassigned')}
            ${detailCard('Approved Hours', formatHours(payment.approved_hours))}
            ${detailCard('Rate', formatMoney(payment.hourly_rate_usd))}
            ${detailCard('Total', formatMoney(payment.total_usd))}
            ${detailCard('Payment Status', statusLabel(payment.payment_status || payment.status))}
            ${detailCard('Paid Date', formatDate(payment.paid_at))}
            ${detailCard('Paid By', payment.payer?.full_name || payment.payer?.email || '-')}
          </div>
          <div class="detail-card detail-card-spaced">
            <p class="detail-label">Payment History</p>
            <div class="detail-card-body">
              ${renderPaymentTimeline(payment, history)}
            </div>
          </div>
        `;
      }

      function detailCard(label, value) {
        return `
          <div class="detail-card">
            <p class="detail-label">${escapeHtml(label)}</p>
            <p class="detail-value">${escapeHtml(String(value ?? '-'))}</p>
          </div>
        `;
      }

      function metricCard(label, value, caption) {
        return `
          <section class="metric">
            <p class="metric-label">${escapeHtml(label)}</p>
            <p class="metric-value">${escapeHtml(String(value))}</p>
            <p class="metric-caption">${escapeHtml(caption)}</p>
          </section>
        `;
      }

      function emptyState(title, copy, compact = false) {
        return `
          <div class="empty-state ${compact ? 'compact' : ''}">
            <div>
              <div class="empty-icon" aria-hidden="true">BS</div>
              <p class="empty-title">${escapeHtml(title)}</p>
              <p class="empty-copy">${escapeHtml(copy)}</p>
            </div>
          </div>
        `;
      }

      function statusPill(status) {
        const normalized = String(status || 'unknown').toLowerCase();

      function getViewCount(view) {
        if (view === 'people') {
          return buildPeople().length;

        if (view === 'projects') {
          return visibleProjects().length;
        }
        if (view === 'organization') {
          return visibleProjectRoles().filter((assignment) => assignment.active === true).length;
        }
        if (view === 'tasks') {
          return visibleTasks().length;
        }
        if (view === 'timeTracker') {
          return visibleTimeEntries().length;
        }
        if (view === 'documents') {
          return visibleDocuments().length;
        }
        if (view === 'deliverables') {
          return visibleDeliverables().length;
        }
        if (view === 'workLogs') {
          return visibleWorkLogs().length;
        }
        if (view === 'payments') {
          return buildPayableRows().length;
        }
        return '';

      function canCreateProjects() {
        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        return state.projectRoles.some((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
          && assignment.role === 'founder'
        ));
      }

      function canManageWorkspace() {
        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        return visibleProjectRoles().some((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
          && ['founder', 'owner'].includes(assignment.role)
        ));
      }

      function isGlobalFounderOrAdmin() {
        return ['platform_admin', 'founder'].includes(state.profile?.platform_role);
      }

        if (isGlobalFounderOrAdmin()) {
          return visibleProjects();
        }

        const projectIds = new Set(
          state.projectRoles

            .filter((assignment) => assignment.active === true)

            .map((assignment) => assignment.project_id)
        );

        return visibleProjects().filter((project) => projectIds.has(project.id));

      function manageableProjects() {
        if (isGlobalFounderOrAdmin()) {

            .filter((assignment) => assignment.active === true)

        }

        if (!log || log.status !== 'pending_approval') {

        return state.projectRoles.some((assignment) => (
          assignment.project_id === log.project_id
          && assignment.user_id === state.profile?.id

      function projectTeamAssignments(projectId) {

          .filter((assignment) => assignment.member || assignment.user_id || assignment.invite_email || assignment.invited_name)
          .sort(compareAssignmentsByHierarchy)
          .filter((assignment) => {
            const identity = assignment.member?.id || assignment.user_id || assignment.invite_email || assignment.id;
            if (!identity || seen.has(identity)) {
              return false;
            }

            seen.add(identity);
            return true;
          });

      function projectTeamStats(projectId, userId) {
        if (!projectId || !userId) {
          return {
            approvedHours: 0,
            totalEarned: 0,
            completedDeliverables: 0
          };
        }

        const approvedLogs = state.workLogs.filter((log) => (
          log.project_id === projectId
          && log.worker_user_id === userId
          && log.status === 'approved'
        ));
        const approvedHours = approvedLogs.reduce((total, log) => total + approvedHoursForLog(log), 0);
        const totalEarned = approvedLogs.reduce((total, log) => {
          const rate = findHourlyRate(log.project_id, log.worker_user_id);
          return total + (approvedHoursForLog(log) * rate);
        }, 0);
        const completedDeliverables = state.deliverables.filter((deliverable) => (
          deliverable.project_id === projectId
          && deliverable.responsible_user_id === userId
          && ['delivered', 'approved'].includes(deliverable.status)
        )).length;

        return {
          approvedHours,
          totalEarned,
          completedDeliverables
        };
      }

      function addableProjectsForPerson(person) {

          return [];
        }

        const assignedProjectIds = new Set(
          state.projectRoles
            .filter((assignment) => (assignment.member?.id || assignment.user_id) === person.userId)
            .map((assignment) => assignment.project_id)
        );

        return manageableProjects().filter((project) => !assignedProjectIds.has(project.id));
      }

      function buildCollaboratorStats(userId) {
        if (!userId) {
          return {
            approvedHours: 0,
            totalEarned: 0,
            completedDeliverables: 0,
            completedTasks: 0,
            lastActivity: null
          };
        }

        const approvedLogs = visibleWorkLogs().filter((log) => (
          log.worker_user_id === userId
          && log.status === 'approved'
        ));
        const approvedHours = approvedLogs.reduce((total, log) => total + toNumber(log.approved_hours), 0);
        const totalEarned = approvedLogs.reduce((total, log) => {
          const rate = findHourlyRate(log.project_id, log.worker_user_id);
          return total + (toNumber(log.approved_hours) * rate);
        }, 0);
        const completedDeliverables = visibleDeliverables().filter((deliverable) => (
          deliverable.responsible_user_id === userId
          && ['delivered', 'approved'].includes(deliverable.status)
        )).length;
        const completedTasks = visibleTasks().filter((task) => (
          task.assigned_to === userId
          && task.status === 'done'
        )).length;
        const dates = [
          ...visibleWorkLogs()
            .filter((log) => log.worker_user_id === userId)
            .map((log) => log.approved_at || log.submitted_at || log.work_date),
          ...visibleDeliverables()
            .filter((deliverable) => deliverable.responsible_user_id === userId)
            .map((deliverable) => deliverable.approved_at || deliverable.delivered_at || deliverable.updated_at || deliverable.created_at),
          ...visibleTasks()
            .filter((task) => task.assigned_to === userId)
            .map((task) => task.completed_at || task.updated_at || task.created_at),
          ...visibleTimeEntries()
            .filter((entry) => entry.user_id === userId)
            .map((entry) => entry.ended_at || entry.started_at || entry.updated_at || entry.created_at),
          ...visibleDocuments()
            .filter((document) => documentRelatedToPerson(document, userId))
            .map((document) => document.archived_at || document.updated_at || document.created_at)
        ].filter(Boolean);

        return {
          approvedHours,
          totalEarned,
          completedDeliverables,
          completedTasks,
          lastActivity: latestDateValue(dates)
        };
      }

      function buildCollaboratorProjectBreakdown(userId) {
        if (!userId) {
          return [];
        }

        const rows = new Map();

        visibleProjectRoles()
          .filter((assignment) => (assignment.member?.id || assignment.user_id) === userId)
          .forEach((assignment) => {
            if (!rows.has(assignment.project_id)) {
              rows.set(assignment.project_id, {
                projectId: assignment.project_id,
                projectName: assignment.project?.name || 'Project',
                approvedHours: 0,
                totalEarned: 0
              });
            }
          });

        visibleWorkLogs()
          .filter((log) => log.worker_user_id === userId && log.status === 'approved')
          .forEach((log) => {
            const key = log.project_id || 'unassigned';
            if (!rows.has(key)) {
              rows.set(key, {
                projectId: key,
                projectName: log.project?.name || 'Unassigned',
                approvedHours: 0,
                totalEarned: 0
              });
            }

            const row = rows.get(key);
            const approvedHours = toNumber(log.approved_hours);
            row.approvedHours += approvedHours;
            row.totalEarned += approvedHours * findHourlyRate(log.project_id, log.worker_user_id);
          });

        return Array.from(rows.values())
          .filter((row) => row.approvedHours > 0 || row.totalEarned > 0)
          .sort((a, b) => compareText(a.projectName, b.projectName));
      }

      function buildPayableRows() {
        const rows = new Map();

        visibleWorkLogs()
          .filter((log) => log.status === 'approved')
          .forEach((log) => {
            const approvedHours = toNumber(log.approved_hours);
            if (approvedHours <= 0) {
              return;
            }

            const rate = findHourlyRate(log.project_id, log.worker_user_id);
            const key = `${log.project_id || 'no-project'}:${log.worker_user_id || 'no-user'}:${rate}`;

            if (!rows.has(key)) {
              rows.set(key, {
                key,
                project_id: log.project_id,
                user_id: log.worker_user_id,
                collaborator: log.worker || { full_name: 'Unknown', email: '' },
                project: log.project || { name: 'Unassigned' },
                hourly_rate_usd: rate,
                approved_hours: 0,
                total_usd: 0,
                status: 'pending',
                payment_status: 'pending',
                paid_at: null,
                payer: null,
                payment_id: null
              });
            }

            const row = rows.get(key);
            row.approved_hours += approvedHours;
            row.total_usd = row.approved_hours * rate;
          });

        rows.forEach((row) => {
          const record = findPaymentRecord(row.project_id, row.user_id, row.hourly_rate_usd);
          if (!record) {
            return;
          }

          const recordHours = toNumber(record.approved_hours);
          const hasNewApprovedHours = Math.abs(recordHours - toNumber(row.approved_hours)) > 0.009;
          const recordStatus = normalizePaymentStatus(record.status);

          row.payment_id = record.id;
          row.paid_at = record.paid_at;
          row.payer = record.payer;
          row.status = recordStatus;
          row.payment_status = recordStatus === 'paid' && hasNewApprovedHours ? 'pending' : recordStatus;
        });

        return Array.from(rows.values()).sort((a, b) => {
          const projectCompare = String(a.project?.name || '').localeCompare(String(b.project?.name || ''));
          if (projectCompare !== 0) {
            return projectCompare;
          }
          return String(a.collaborator?.full_name || a.collaborator?.email || '').localeCompare(String(b.collaborator?.full_name || b.collaborator?.email || ''));
        });
      }

      function findPayableRow(paymentKey) {
        return buildPayableRows().find((payment) => payment.key === paymentKey);
      }

      function findPaymentRecord(projectId, userId, hourlyRate) {
        return visiblePayments()
          .filter((payment) => (
            payment.project_id === projectId
            && payment.user_id === userId
            && toNumber(payment.hourly_rate_usd) === toNumber(hourlyRate)
          ))
          .sort((a, b) => new Date(b.updated_at || b.created_at || 0) - new Date(a.updated_at || a.created_at || 0))[0] || null;
      }

      function normalizePaymentStatus(status) {
        const normalized = String(status || 'pending').toLowerCase();
        if (normalized === 'paid') {
          return 'paid';
        }
        if (normalized === 'approved') {
          return 'approved';
        }
        return 'pending';
      }

      function findHourlyRate(projectId, userId) {
        const role = state.projectRoles.find((assignment) => (
          assignment.project_id === projectId
          && assignment.user_id === userId
          && assignment.active === true
        ));

        return toNumber(role?.hourly_rate_usd);
      }

          });

        visibleDocuments()
          .filter((document) => document.related_user_id && document.related_user)
          .forEach((document) => {
            if (people.has(document.related_user_id)) {
              return;
            }
            people.set(document.related_user_id, {
              userId: document.related_user_id,
              name: document.related_user.full_name || document.related_user.email || 'Collaborator',
              email: document.related_user.email || ''
            });
          });

        if (state.profile?.id && !people.has(state.profile.id)) {
          people.set(state.profile.id, {
            userId: state.profile.id,
            name: state.profile.full_name || state.profile.email || 'Me',
            email: state.profile.email || ''
          });
        }

        return Array.from(people.values()).sort((a, b) => compareText(a.name, b.name));
      }

      function updateDocumentScopeUi() {
        const scopeSelect = app.querySelector('[data-document-scope]');
        const projectSelect = app.querySelector('[data-document-project]');
        const projectHint = app.querySelector('[data-document-project-hint]');
        const collaboratorField = app.querySelector('[data-document-collaborator-field]');
        const collaboratorSelect = app.querySelector('[data-document-collaborator]');

        if (!scopeSelect || !projectSelect) {
          return;
        }

        const scope = normalizeDocumentScope(scopeSelect.value);
        const requiresProject = documentScopeRequiresProject(scope);
        projectSelect.required = requiresProject;

        if (projectHint) {
          projectHint.textContent = requiresProject
            ? 'Required for project documents.'
            : 'Optional. Leave blank for Bastida Systems-level documents.';
        }

        if (collaboratorField) {
          const shouldShowCollaborator = ['collaborator', 'legal', 'finance', 'internal'].includes(scope);
          collaboratorField.hidden = !shouldShowCollaborator;
          if (!shouldShowCollaborator && collaboratorSelect) {
            collaboratorSelect.value = '';
          }
        }
      }

      function normalizeInvitationStatus(assignment) {
        if (assignment.invitation_status) {
          return assignment.invitation_status;
        }

        return assignment.active ? 'active_member' : 'pending_acceptance';
      }

      function isInvitationRecord(assignment) {
        const status = normalizeInvitationStatus(assignment);
        return Boolean(assignment.invite_email)
          || Boolean(assignment.invited_at)
          || Boolean(assignment.accepted_at)
          || ['invite_sent', 'pending_acceptance', 'error_sending_invite'].includes(status);
      }

      function mergeInvitationStatus(currentStatus, nextStatus) {
        const priority = {
          error_sending_invite: 4,
          pending_acceptance: 3,
          invite_sent: 2,
          active_member: 1
        };

        return (priority[nextStatus] || 0) > (priority[currentStatus] || 0) ? nextStatus : currentStatus;
      }

      function profileName() {
        return state.profile?.full_name || state.authUser?.email || t('auth.user');
      }

      function profileRole() {
        if (isGlobalFounderOrAdmin()) {
          return t('role.founder');
        }

        const assignments = state.projectRoles.filter((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
        ));

        return roleSummaryForAssignments(assignments, state.profile) || t('role.member');
      }

      function roleLabel(role) {
        return roleLabels[role] || labelize(role || 'collaborator');
      }

      function roleSummaryForAssignments(assignments, profile = null) {
        const activeAssignments = (assignments || []).filter((assignment) => assignment.active !== false);

        const platformRole = profile?.platform_role || profile?.platformRole;

        if (['founder', 'platform_admin'].includes(platformRole) || activeAssignments.some((assignment) => assignment.role === 'founder')) {
          return t('role.founder');
        }

        const priority = ['owner', 'core_collaborator', 'designer', 'developer', 'contractor'];
        const topRole = priority.find((role) => activeAssignments.some((assignment) => assignment.role === role));

        if (!topRole) {
          if (platformRole && platformRole !== 'client_user') {
            return labelize(platformRole);
          }

          return t('role.member');
        }

        const projectNames = uniqueValues(
          activeAssignments
            .filter((assignment) => assignment.role === topRole)
            .map((assignment) => assignment.project?.name)
            .filter(Boolean)
        );

        if (projectNames.length === 1) {
          return `${roleLabel(topRole)} • ${projectNames[0]}`;
        }

        return `${roleLabel(topRole)} • ${projectNames.length || activeAssignments.length} Projects`;
      }

      function labelize(value) {
        return String(value || '')
          .replace(/_/g, ' ')
          .replace(/\b\w/g, (character) => character.toUpperCase());
      }

      function initials(value) {
        const cleaned = String(value || 'Bastida Systems')
          .replace(/@.*$/, '')
          .trim();
        const parts = cleaned.split(/\s+/).filter(Boolean);
        const letters = parts.length > 1
          ? `${parts[0][0] || ''}${parts[1][0] || ''}`
          : (parts[0] || 'BS').slice(0, 2);

        return letters.toUpperCase();
      }

      function compareText(a, b) {
        return String(a || '').localeCompare(String(b || ''), undefined, { sensitivity: 'base' });
      }

      function compareDateDesc(a, b) {
        return dateTime(b) - dateTime(a);
      }

      function compareDateAsc(a, b) {
        const first = dateTime(a);
        const second = dateTime(b);

        if (!first && !second) {
          return 0;
        }
        if (!first) {
          return 1;
        }
        if (!second) {
          return -1;
        }

        return first - second;
      }

      function taskPriorityValue(priority) {
        const values = {
          critical: 4,
          high: 3,
          medium: 2,
          low: 1
        };

        return values[String(priority || '').toLowerCase()] || 0;
      }

      function dateTime(value) {
        if (!value) {
          return 0;
        }

        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? 0 : date.getTime();
      }

      function formatMoney(value) {
        return moneyFormatter.format(toNumber(value));
      }

      function formatHours(value) {
        return numberFormatter.format(toNumber(value));
      }

      function formatDate(value) {
        if (!value) {
          return '-';
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '-';
        }

        return dateFormatter.format(date);
      }

      function formatDateTime(value) {
        if (!value) {
          return '-';
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '-';
        }

        return `${dateFormatter.format(date)} ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      }

      function timeEntryDurationMinutes(entry, includeRunning = false) {
        if (!entry) {
          return 0;
        }

        if (entry.duration_minutes !== null && typeof entry.duration_minutes !== 'undefined') {
          return toNumber(entry.duration_minutes);
        }

        if (!entry.started_at || (!entry.ended_at && !includeRunning)) {
          return 0;
        }

        const start = new Date(entry.started_at);
        const end = entry.ended_at ? new Date(entry.ended_at) : new Date();
        if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
          return 0;
        }

        return Math.max(0, Math.floor((end - start) / 60000));
      }

      function formatDurationMinutes(minutes) {
        const totalMinutes = Math.max(0, Math.round(toNumber(minutes)));
        const hours = Math.floor(totalMinutes / 60);
        const remaining = totalMinutes % 60;

        if (!hours) {
          return `${remaining}m`;
        }

        return `${hours}h ${remaining}m`;
      }

      function latestDateValue(values) {
        const sorted = values
          .map((value) => new Date(value))
          .filter((date) => !Number.isNaN(date.getTime()))
          .sort((a, b) => b - a);

        return sorted[0]?.toISOString() || null;
      }

      function todayISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function toNumber(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function uniqueValues(values) {
        return Array.from(new Set(values));
      }

      function memberName(assignment) {
        return assignment?.member?.full_name
          || assignment?.invited_name
          || assignment?.member?.email
          || assignment?.invite_email
          || 'Project member';
      }

      function memberEmail(assignment) {
        return assignment?.member?.email || assignment?.invite_email || '';
      }

      function personDisplayName(person) {
        return person?.full_name || person?.email || '';
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#096;');
      }
    })();
  </script>
</body>
</html>
