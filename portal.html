<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastida OS | Bastida Systems</title>
  <meta name="description" content="Private Bastida Systems operating portal for collaborators, projects, work logs, deliverables, and payments.">
  <link rel="icon" type="image/png" href="img/logo_bastida_sys.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-strong: #f1f5f9;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --line-strong: #cbd5e1;
      --accent: #1d4ed8;
      --accent-strong: #172554;
      --success: #047857;
      --warning: #b45309;
      --danger: #dc2626;
      --info: #2563eb;
      --radius: 8px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-soft: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(29, 78, 216, 0.18);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      color: var(--accent-strong);
      box-shadow: var(--shadow-soft);
      font-weight: 700;
      font-size: 13px;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .brand-subtitle {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-soft);
      padding: 10px 11px;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      background: #eef4ff;
      color: var(--text);
    }

    .nav-button.is-active {
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
    }

    .nav-count {
      display: inline-flex;
      min-width: 24px;
      justify-content: center;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.08);
      color: inherit;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 700;
    }

    .nav-button.is-active .nav-count {
      background: rgba(255, 255, 255, 0.16);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      padding: 26px 30px 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 44px;
      margin-bottom: 26px;
    }

    .page-kicker {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-title {
      margin: 3px 0 0;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .page-copy {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.6;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .language-switcher {
      display: inline-grid;
      gap: 4px;
      min-width: 92px;
    }

    .language-select {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      font-weight: 800;
      outline: none;
    }

    .language-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .workspace-switcher {
      display: grid;
      grid-template-columns: minmax(170px, 240px);
      gap: 4px;
      min-width: 0;
    }

    .workspace-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
    }

    .workspace-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      font-weight: 750;
      outline: none;
    }

    .workspace-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .workspace-static {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 0 11px;
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .profile-meta {
      min-width: 0;
      text-align: right;
    }

    .profile-name {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-role {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 13px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .button:hover {
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    .button-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button-ghost {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .button-small {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .inline-link-button {
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 0;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .inline-link-button:hover {
      color: #1d4ed8;
    }

    .detail-value-button {
      margin-top: 6px;
      font-size: 15px;
      line-height: 1.35;
    }

    .button-danger {
      border-color: rgba(220, 38, 38, 0.2);
      color: var(--danger);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .section-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-grid-spaced {
      margin-top: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .field textarea {
      min-height: 86px;
      padding: 10px 12px;
      resize: vertical;
      line-height: 1.45;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .field-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .notice-success {
      border-color: rgba(15, 118, 110, 0.18);
      background: rgba(15, 118, 110, 0.07);
      color: var(--success);
    }

    .notice-error {
      border-color: rgba(185, 28, 28, 0.18);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.32);
      padding: 18px;
    }

    .modal {
      width: min(100%, 520px);
      max-height: min(760px, calc(100vh - 36px));
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
    }

    .modal-wide {
      width: min(100%, 760px);
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .modal-header {
      border-bottom: 1px solid var(--line);
    }

    .modal-footer {
      border-top: 1px solid var(--line);
    }

    .modal-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .modal-copy {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 24px 0 14px;
    }

    .toolbar-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .toolbar-copy {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .metric {
      position: relative;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 18px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), rgba(29, 78, 216, 0));
    }

    .metric-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .metric-value {
      margin: 12px 0 0;
      color: var(--text);
      font-size: 30px;
      font-weight: 760;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .metric-caption {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .dashboard-overview {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin: 0 0 16px;
      border: 1px solid rgba(203, 213, 225, 0.8);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ffffff 0%, #f8fbff 72%, #eef6ff 100%);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .dashboard-overview-title {
      margin: 0;
      color: var(--text);
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .dashboard-overview-copy {
      max-width: 760px;
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.55;
    }

    .dashboard-overview-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }

    .dashboard-overview-meta span {
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text-soft);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .dashboard-stack,
    .dashboard-side {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .dashboard-split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      min-width: 0;
    }

    .panel {
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-wide {
      grid-column: 1 / -1;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .table-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
      padding: 12px 18px;
    }

    .table-control-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .table-filter,
    .table-sort {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .table-filter input,
    .table-filter select,
    .table-sort select {
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }

    .table-filter input {
      width: min(260px, 58vw);
    }

    .table-filter input:focus,
    .table-filter select:focus,
    .table-sort select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .table-pagination {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .page-button {
      display: inline-grid;
      place-items: center;
      min-width: 32px;
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
    }

    .page-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    .table-compact {
      min-width: 0;
      table-layout: fixed;
    }

    .table-compact th:nth-child(1),
    .table-compact td:nth-child(1) {
      width: 74px;
    }

    .table-compact th:nth-child(2),
    .table-compact td:nth-child(2) {
      width: 110px;
    }

    .table-compact th:nth-child(4),
    .table-compact td:nth-child(4),
    .table-compact th:nth-child(5),
    .table-compact td:nth-child(5) {
      width: 86px;
    }

    .table-compact th:nth-child(6),
    .table-compact td:nth-child(6) {
      width: 132px;
    }

    .table-compact th:nth-child(7),
    .table-compact td:nth-child(7) {
      width: 136px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    td {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.45;
    }

    tbody tr {
      transition: background 140ms ease;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .cell-title {
      display: block;
      color: var(--text);
      font-weight: 700;
      line-height: 1.35;
    }

    .cell-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .truncate {
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-subtitle.truncate {
      display: block;
    }

    .cell-muted {
      color: var(--muted);
      font-size: 12px;
    }

    .dashboard-list {
      display: grid;
    }

    .dashboard-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }

    .dashboard-list-item:last-child {
      border-bottom: 0;
    }

    .dashboard-list-main {
      min-width: 0;
    }

    .dashboard-list-side {
      display: grid;
      justify-items: end;
      gap: 5px;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-align: right;
      white-space: nowrap;
    }

    .progress-wrap {
      display: grid;
      gap: 6px;
      min-width: 112px;
    }

    .progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1d4ed8, #10b981);
    }

    .progress-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .payment-metrics {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 0 0 16px;
    }

    .payment-timeline {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .payment-timeline-item {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
    }

      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;

      display: grid;
      gap: 8px;

    .assignment-item {
      display: grid;
      gap: 2px;

      min-height: 170px;

    .empty-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

      max-width: 420px;
      margin: 8px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;

      margin: 0;

      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;

      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--accent);
      font-weight: 800;

      display: flex;
      flex-wrap: wrap;
      gap: 6px;

      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      padding: 0 9px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;

    .activity-feed {
      display: grid;
      gap: 0;

      padding: 14px 18px;

      border-bottom: 0;

    .activity-dot {
      width: 9px;
      height: 9px;
      margin-top: 5px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);

    .activity-title {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.35;
    }

    .activity-meta {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .org-board {
      overflow: hidden;
      background:

    .org-toolbar {
      display: flex;

    .org-toolbar-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .org-zoom-label {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .org-canvas {
      min-height: 620px;
      overflow: auto;
      padding: 28px;
    }

    .org-scale-shell {
      position: relative;
      min-width: 980px;
    }

    .org-canvas-inner {
      position: relative;
      transform-origin: 0 0;
    }

    .org-connector-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .org-connector {
      fill: none;
      stroke: #64748b;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.78;

    .org-node {
      position: absolute;
      width: 292px;
      min-height: 128px;
      border: 1px solid rgba(203, 213, 225, 0.9);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
      color: var(--text);
      overflow: visible;
    }

    .org-person-node {
      width: 292px;
      min-height: 128px;
      border-color: rgba(148, 163, 184, 0.5);
      background: #ffffff;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;

    .org-person-node:hover {
      border-color: rgba(29, 78, 216, 0.46);

    .org-root-node {
      border-color: rgba(29, 78, 216, 0.2);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);

    .org-node-main {
      display: flex;

      gap: 11px;

      background: transparent;
      color: inherit;
      padding: 13px;
      text-align: left;
    }

    button.org-node-main {
      cursor: pointer;
    }

    button.org-node-main:focus-visible {
      outline: 3px solid rgba(29, 78, 216, 0.18);
      outline-offset: 2px;
    }

      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(29, 78, 216, 0.18);
      border-radius: 999px;
      background: #eff6ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .org-avatar-project {
      border-radius: var(--radius);
      background: #ecfeff;
      color: #0e7490;
    }

    .org-avatar-brand {
      border-radius: var(--radius);
      background: #dbeafe;
      color: var(--accent-strong);
    }

    .org-node-body {
      min-width: 0;
      width: 100%;
    }

    .org-node-title,
    .org-node-role,
    .org-node-project,
    .org-node-position {
      overflow: hidden;
      margin: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .org-node-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.25;
    }

    .org-node-role {
      margin-top: 3px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.25;
    }

    .org-node-project {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .org-node-position {
      margin-top: 4px;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .org-node-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .org-node-metric {
      display: inline-flex;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.85);
      color: var(--text-soft);
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .org-node-toggle {
      position: absolute;
      top: -10px;
      right: -10px;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow-soft);
      font-size: 15px;
      font-weight: 900;
    }

    .org-role-founder {
      border-color: rgba(49, 46, 129, 0.3);
      background: linear-gradient(135deg, #eef2ff 0%, #ffffff 78%);
    }

    .org-role-founder .org-node-avatar {
      border-color: rgba(49, 46, 129, 0.25);
      background: #312e81;
      color: #ffffff;
    }

    .org-role-owner {
      border-color: rgba(29, 78, 216, 0.28);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 78%);
    }

    .org-role-owner .org-node-avatar {
      border-color: rgba(29, 78, 216, 0.24);
      background: #dbeafe;
      color: #1d4ed8;
    }

    .org-role-core_collaborator {
      border-color: rgba(5, 150, 105, 0.26);
      background: linear-gradient(135deg, #ecfdf5 0%, #ffffff 78%);
    }

      border-color: rgba(5, 150, 105, 0.24);
      background: #d1fae5;
      color: #047857;
    }

    .org-role-designer,
    .org-role-developer {
      border-color: rgba(5, 150, 105, 0.26);
      background: linear-gradient(135deg, #ecfdf5 0%, #ffffff 78%);

    .org-role-designer .org-node-avatar,
    .org-role-developer .org-node-avatar {
      border-color: rgba(5, 150, 105, 0.24);
      background: #d1fae5;
      color: #047857;
    }

    .org-role-contractor {
      border-color: rgba(180, 83, 9, 0.28);
      background: linear-gradient(135deg, #fff7ed 0%, #ffffff 78%);
    }

    .org-role-contractor .org-node-avatar {
      border-color: rgba(180, 83, 9, 0.24);
      background: #ffedd5;
      color: #b45309;
    }

    .org-role-unassigned_project {
      border-style: dashed;
      border-color: rgba(100, 116, 139, 0.5);
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 78%);

      border-color: rgba(100, 116, 139, 0.24);
      background: #e2e8f0;
      color: #475569;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: flex;
      justify-content: flex-end;
      background: rgba(15, 23, 42, 0.24);

    .profile-drawer {
      width: min(100%, 440px);
      height: 100vh;
      overflow-y: auto;
      border-left: 1px solid var(--line);
      background: var(--surface);
      box-shadow: -24px 0 70px rgba(15, 23, 42, 0.2);

    .drawer-header {

      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);

      gap: 14px;

      padding-bottom: 8px;

      border-bottom: 0;
      padding-bottom: 0;

      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;

      background: var(--surface-muted);
      padding: 12px;

    .auth-wall {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-panel {
      width: min(100%, 460px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-panel h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;

      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .mobile-nav {
      display: none;
      width: 100%;
      margin: 0 0 20px;
    }

    .mobile-nav select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1040px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid,
      .dashboard-grid,
      .dashboard-split {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .main {
        padding: 18px 16px 34px;
      }

      .mobile-nav {
        display: block;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .profile {
        width: 100%;
        align-items: stretch;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .workspace-switcher {
        grid-template-columns: 1fr;
        order: 2;
        width: 100%;
      }

      .language-switcher {
        order: 3;
        width: 100%;
      }

      .language-select {
        width: 100%;
      }

      .profile-meta {
        text-align: left;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .panel-header {
        flex-direction: column;
      }

      .dashboard-overview {
        flex-direction: column;
      }

      .dashboard-overview-meta {
        justify-content: flex-start;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      table {
        min-width: 640px;
      }

      .table-controls {
        align-items: stretch;
        flex-direction: column;
      }

      .table-control-group,
      .table-pagination {
        justify-content: flex-start;
      }

      .org-canvas {
        min-height: 520px;
        padding: 18px;
      }

      .org-scale-shell {
        min-width: 980px;
      }

      .profile-drawer {
        width: 100%;
      }
    }
  </style>
</head>

      async function init() {
        try {
          state.client = createSupabaseClient();
          const { data, error } = await state.client.auth.getSession();

          if (error) {
            throw error;
          }

          state.session = data.session;

          if (!state.session) {
            renderSignedOut();
            return;
          }

          const userResponse = await state.client.auth.getUser();
          if (userResponse.error) {
            throw userResponse.error;
          }

          state.authUser = userResponse.data.user;
          await loadPortalData();
          renderApp();
        } catch (error) {
          state.error = error;
          renderFatalError(error);
        }
      }

      function createSupabaseClient() {
        if (!window.supabase || !window.supabase.createClient) {
          throw new Error('Supabase client library did not load.');
        }

        if (!config.url || !config.anonKey) {
          throw new Error('Supabase configuration is missing. Add SUPABASE_URL and SUPABASE_ANON_KEY in supabase-config.js.');
        }

        const supabaseUrl = String(config.url)
          .replace(/\/rest\/v1\/?$/i, '')
          .replace(/\/$/, '');

        return window.supabase.createClient(supabaseUrl, config.anonKey);
      }

          throw profileResult.error;

        state.profile = profileResult.data;
        await acceptPendingInvites();

        const [projects, roles, tasks, timeEntries, documents, deliverables, workLogs, payments, paymentHistory] = await Promise.all([

          state.client

      function renderWorkspaceSwitcher() {
        const projectOptions = workspaceProjectOptions();
        const options = workspaceOptions();
        const active = activeWorkspaceOption();

        if (!options.length) {
          return '';

        if (options.length <= 1) {
          return `
            <div class="workspace-switcher" aria-label="${escapeAttr(t('workspace.active'))}">
              <span class="workspace-label">${escapeHtml(t('workspace.label'))}</span>

      function workspaceOptions() {
        const projectOptions = workspaceProjectOptions();
        const options = [];

        if (canUseAllWorkspace()) {
          options.push({
            id: 'all',
            label: workspaceOverviewLabel(),
            role: workspaceOverviewRole(),
            projectName: workspaceOverviewLabel()
          });
        }

        return options.concat(projectOptions);
      }

      function workspaceOverviewLabel() {
        if (isGlobalFounderOrAdmin()) {
          return t('workspace.allBastida');
        }

        if (currentUserProjectAssignments().some((assignment) => ['founder', 'owner'].includes(assignment.role))) {
          return t('workspace.allMine');
        }

        return t('workspace.mine');
      }

      function workspaceOverviewRole() {
        if (isGlobalFounderOrAdmin()) {
          return t('role.founder');
        }

        const role = topRoleForAssignments(currentUserProjectAssignments());
        return role ? roleLabel(role) : t('role.overview');
      }

      function workspaceProjectOptions() {
        const projectMap = new Map(state.projects.map((project) => [project.id, project]));
        const optionsByProject = new Map();
        const assignments = currentUserProjectAssignments();

        assignments.forEach((assignment) => {
          const project = projectMap.get(assignment.project_id) || assignment.project;
          if (!project?.id) {
            return;
          }

          if (!optionsByProject.has(project.id)) {
            optionsByProject.set(project.id, {
              id: project.id,
              label: `${project.name} - ${workspaceRoleForProject(project.id)}`,
              role: workspaceRoleForProject(project.id),
              projectName: project.name
            });
          }
        });

        if (isGlobalFounderOrAdmin()) {
          state.projects.forEach((project) => {
            if (!optionsByProject.has(project.id)) {
              optionsByProject.set(project.id, {
                id: project.id,
                label: `${project.name} - ${t('role.founder')}`,
                role: t('role.founder'),
                projectName: project.name
              });
            }
          });
        }

        return Array.from(optionsByProject.values())
          .sort((a, b) => compareText(a.projectName, b.projectName));
      }

      function currentUserProjectAssignments() {
        return state.projectRoles.filter((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
        ));
      }

      function canUseAllWorkspace() {
        return isGlobalFounderOrAdmin()
          || currentUserProjectAssignments().length > 0;
      }

      function activeWorkspaceOption() {
        return workspaceOptions().find((option) => option.id === state.workspace.projectId)
          || workspaceOptions()[0]
          || null;
      }

      function normalizeActiveWorkspace() {
        const options = workspaceOptions();

        if (!options.length) {
          state.workspace.projectId = 'all';
          return;
        }

        if (!options.some((option) => option.id === state.workspace.projectId)) {
          const allOption = options.find((option) => option.id === 'all');
          state.workspace.projectId = allOption?.id || options[0].id;
        }
      }

      function resetWorkspaceScopedUi() {
        Object.values(state.tables).forEach((table) => {
          table.page = 1;
        });
        state.organization.collapsedNodeIds = [];
        state.detail.isOpen = false;
        state.detail.kind = '';
        state.detail.id = '';
        state.projectTeam.isOpen = false;
        state.projectTeam.projectId = null;
      }

      function isAllWorkspaceActive() {
        return state.workspace.projectId === 'all' && canUseAllWorkspace();
      }

      function activeWorkspaceProjectId() {
        return isAllWorkspaceActive() ? null : state.workspace.projectId;
      }

      function activeWorkspaceProjectIds() {
        const projectId = activeWorkspaceProjectId();
        if (projectId) {
          return new Set([projectId]);
        }

        return new Set(visibleWorkspaceProjectIdsForAll());
      }

      function visibleWorkspaceProjectIdsForAll() {
        if (isGlobalFounderOrAdmin()) {
          return state.projects.map((project) => project.id);
        }

        return workspaceProjectOptions().map((option) => option.id);
      }

      function visibleProjects() {
        const projectIds = activeWorkspaceProjectIds();
        return state.projects.filter((project) => projectIds.has(project.id));
      }

      function visibleProjectRoles() {
        const projectIds = activeWorkspaceProjectIds();
        return state.projectRoles.filter((assignment) => projectIds.has(assignment.project_id));
      }

      function visibleDeliverables() {
        const projectIds = activeWorkspaceProjectIds();
        return state.deliverables.filter((deliverable) => projectIds.has(deliverable.project_id));
      }

      function visibleTasks() {
        const projectIds = activeWorkspaceProjectIds();
        return state.tasks.filter((task) => projectIds.has(task.project_id));
      }

      function visibleTimeEntries() {
        const projectIds = activeWorkspaceProjectIds();
        return state.timeEntries.filter((entry) => projectIds.has(entry.project_id));
      }

      function visibleDocuments() {
        const projectIds = activeWorkspaceProjectIds();
        return state.documents.filter((document) => {
          if (document.project_id) {
            return projectIds.has(document.project_id)
              && canViewProjectScopedDocument(document);
          }

          return canViewGeneralDocument(document, activeWorkspaceProjectId());
        });
      }

      function visibleWorkLogs() {
        const projectIds = activeWorkspaceProjectIds();
        return state.workLogs.filter((log) => projectIds.has(log.project_id));
      }

      function visiblePayments() {
        const projectIds = activeWorkspaceProjectIds();
        return state.payments.filter((payment) => projectIds.has(payment.project_id));
      }

      function visiblePaymentHistory() {
        const projectIds = activeWorkspaceProjectIds();
        return state.paymentHistory.filter((history) => (
          history.payment?.project_id
            ? projectIds.has(history.payment.project_id)
            : true
        ));
      }

      function activeWorkspaceRoleLine() {
        const active = activeWorkspaceOption();
        if (!active) {
          return profileRole();
        }

        if (active.id === 'all' && active.role === t('role.overview')) {
          return active.projectName;
        }

        return `${active.role} • ${active.projectName}`;
      }

      function workspaceRoleForProject(projectId) {
        if (isGlobalFounderOrAdmin()) {
          const assignmentRole = topRoleForAssignments(currentUserProjectAssignments().filter((assignment) => assignment.project_id === projectId));
          return assignmentRole ? roleLabel(assignmentRole) : t('role.founder');
        }

        const role = topRoleForAssignments(currentUserProjectAssignments().filter((assignment) => assignment.project_id === projectId));
        return role ? roleLabel(role) : t('role.member');
      }

      function topRoleForAssignments(assignments) {
        const priority = ['founder', 'owner', 'core_collaborator', 'designer', 'developer', 'contractor'];
        return priority.find((role) => assignments.some((assignment) => assignment.role === role)) || null;
      }

      async function handleCreateProjectSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.createProject.isSubmitting = true;
        state.createProject.message = '';
        state.createProject.type = '';
        renderApp();

        try {
          const body = {
            name: String(formData.get('name') || '').trim(),
            slug: String(formData.get('slug') || '').trim() || null,
            description: String(formData.get('description') || '').trim() || null
          };

          const { data, error } = await state.client.functions.invoke('create-project', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error creating project.');
          }

          await loadPortalData();
          state.activeView = 'projects';
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'success';
          state.createProject.message = data?.message || 'Project created';
          renderApp();
        } catch (error) {
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'error';
          state.createProject.message = error instanceof Error ? error.message : 'Error creating project';
          renderApp();
        }
      }

      async function handleInviteSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.invite.isSubmitting = true;
        state.invite.message = '';
        state.invite.type = '';
        renderApp();

        try {
          const hourlyRateValue = String(formData.get('hourly_rate_usd') || '').trim();
          const projectTitle = String(formData.get('project_title') || '').trim();
          const requestedRole = String(formData.get('role') || '').trim();
          const edgeRole = edgeInviteRole(requestedRole);
          const body = {
            name: String(formData.get('name') || '').trim(),
            email: String(formData.get('email') || '').trim(),
            project_id: String(formData.get('project_id') || '').trim(),
            role: edgeRole,
            project_title: projectTitle || null,
            hourly_rate_usd: hourlyRateValue ? Number(hourlyRateValue) : null
          };

          const { data, error } = await state.client.functions.invoke('invite-member', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error sending invite.');
          }

          if (projectTitle || requestedRole !== edgeRole) {
            const { error: titleError } = await state.client.rpc('set_project_role_details', {
              p_project_id: body.project_id,
              p_email: body.email,
              p_role: requestedRole || null,
              p_project_title: projectTitle || null,
              p_hourly_rate_usd: body.hourly_rate_usd
            });

            if (titleError) {
              throw titleError;
            }
          }

          await loadPortalData();
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'success';
          state.invite.message = data?.message || 'Invite sent';
          renderApp();
        } catch (error) {
          try {
            await loadPortalData();
          } catch (_) {
            // Keep the original invite error visible if refresh fails.
          }
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'error';
          state.invite.message = error instanceof Error ? error.message : 'Error sending invite';
          renderApp();
        }
      }

      async function handleAddToProjectSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);
        const person = buildPeople().find((item) => item.userId === state.addProject.userId);
        const projectId = String(formData.get('project_id') || '').trim();
        const hourlyRateValue = String(formData.get('hourly_rate_usd') || '').trim();

        state.addProject.isSubmitting = true;
        state.addProject.message = '';
        state.addProject.type = '';
        renderApp();

        try {
          if (!person?.userId) {
            throw new Error('Collaborator is required.');
          }

          if (!projectId) {
            throw new Error('Project is required.');
          }

          const alreadyAssigned = state.projectRoles.some((assignment) => (
            assignment.project_id === projectId
            && (assignment.member?.id || assignment.user_id) === person.userId
          ));

          if (alreadyAssigned) {
            throw new Error('This collaborator is already assigned to this project.');
          }

          const { error } = await state.client.rpc('assign_existing_project_collaborator', {
            p_project_id: projectId,
            p_user_id: person.userId,
            p_role: String(formData.get('role') || '').trim(),
            p_project_title: String(formData.get('project_title') || '').trim() || null,
            p_hourly_rate_usd: hourlyRateValue ? Number(hourlyRateValue) : null
          });

          if (error) {
            throw error;
          }

          await loadPortalData();
          state.addProject.isOpen = false;
          state.addProject.userId = null;
          state.addProject.isSubmitting = false;
          renderApp();
        } catch (error) {
          state.addProject.isOpen = true;
          state.addProject.isSubmitting = false;
          state.addProject.type = 'error';
          state.addProject.message = error instanceof Error ? error.message : 'Error assigning collaborator';
          renderApp();
        }
      }

      async function handleWorkLogSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.workLog.isSubmitting = true;
        state.workLog.message = '';
        state.workLog.type = '';
        renderApp();

        try {
          const projectId = String(formData.get('project_id') || '').trim();
          const project = state.projects.find((item) => item.id === projectId);
          const hours = Number(formData.get('hours_used'));

          if (!project) {
            throw new Error('Project is required.');
          }

          if (!Number.isFinite(hours) || hours <= 0 || hours > 24) {
            throw new Error('Hours must be greater than 0 and no more than 24.');
          }

          const payload = {
            company_id: project.company_id || null,
            project_id: project.id,
            worker_user_id: state.profile.id,
            created_by: state.profile.id,
            title: String(formData.get('title') || '').trim(),
            description: String(formData.get('description') || '').trim(),
            work_type: String(formData.get('work_type') || '').trim(),
            category: String(formData.get('work_type') || '').trim(),
            work_date: String(formData.get('work_date') || '').trim(),
            hours_used: hours,
            evidence_url: String(formData.get('evidence_url') || '').trim() || null,
            commit_hash: String(formData.get('commit_hash') || '').trim() || null,
            status: 'pending_approval',
            submitted_at: new Date().toISOString(),
            is_billable: true
          };

          if (!payload.title) {
            throw new Error('Title is required.');
          }

          if (!payload.description) {
            throw new Error('Description is required.');
          }

          const { error } = await state.client
            .from('work_logs')
            .insert(payload);

          if (error) {
            throw error;
          }

          if (state.workLog.prefill?.timeEntryId) {
            const { error: timeEntryError } = await state.client
              .from('time_entries')
              .update({
                status: 'converted',
                converted_at: new Date().toISOString()
              })
              .eq('id', state.workLog.prefill.timeEntryId);

            if (timeEntryError) {
              throw timeEntryError;
            }
          }

          await loadPortalData();
          state.activeView = 'workLogs';
          state.workLog.isOpen = true;
          state.workLog.isSubmitting = false;
          state.workLog.type = 'success';
          state.workLog.message = 'Work log submitted for approval.';
          state.workLog.prefill = null;
          renderApp();
        } catch (error) {
          state.workLog.isOpen = true;
          state.workLog.isSubmitting = false;
          state.workLog.type = 'error';
          state.workLog.message = error instanceof Error ? error.message : 'Error creating work log';
          renderApp();
        }
      }

      async function handleTaskSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);
        const taskId = state.taskEditor.taskId;
        const existingTask = taskId ? state.tasks.find((item) => item.id === taskId) : null;
        const projectId = String(formData.get('project_id') || '').trim();
        const title = String(formData.get('title') || '').trim();
        const status = String(formData.get('status') || 'backlog').trim();
        const canManageTargetProject = canManageProject(projectId);
        const canUpdateAssignedTask = Boolean(existingTask)
          && existingTask.project_id === projectId
          && existingTask.assigned_to === state.profile?.id;

        state.taskEditor.isSubmitting = true;
        state.taskEditor.message = '';
        state.taskEditor.type = '';
        renderApp();

        try {
          if (!projectId || !state.projects.some((project) => project.id === projectId)) {
            throw new Error('Project is required.');
          }

          if (!title) {
            throw new Error('Task title is required.');
          }

          if (!canManageTargetProject && !canUpdateAssignedTask) {
            throw new Error('Only a Founder, Owner, or assigned collaborator can update this task.');
          }

          const assignedTo = canManageTargetProject
            ? String(formData.get('assigned_to') || '').trim() || null
            : existingTask.assigned_to;
          const nextCompletedAt = status === 'done'
            ? (existingTask?.completed_at || new Date().toISOString())
            : null;
          const nextCompletedBy = status === 'done'
            ? (existingTask?.completed_by || state.profile.id)
            : null;

          const payload = {
            project_id: projectId,
            title,
            description: String(formData.get('description') || '').trim() || null,
            assigned_to: assignedTo,
            priority: String(formData.get('priority') || 'medium').trim(),
            status,
            due_date: String(formData.get('due_date') || '').trim() || null,
            completed_at: nextCompletedAt,
            completed_by: nextCompletedBy
          };

          const query = taskId
            ? state.client.from('project_tasks').update(payload).eq('id', taskId)
            : state.client.from('project_tasks').insert({ ...payload, created_by: state.profile.id });
          const { error } = await query;

          if (error) {
            throw error;
          }

          await loadPortalData();
          state.activeView = 'tasks';
          state.taskEditor.isOpen = false;
          state.taskEditor.taskId = null;
          state.taskEditor.isSubmitting = false;
          renderApp();
        } catch (error) {
          state.taskEditor.isOpen = true;
          state.taskEditor.isSubmitting = false;
          state.taskEditor.type = 'error';
          state.taskEditor.message = error instanceof Error ? error.message : 'Error saving task';
          renderApp();
        }
      }

      async function handleCompleteTask(taskId) {
        const task = state.tasks.find((item) => item.id === taskId);
        if (!task || !canUpdateTask(task)) {
          return;
        }

        const { error } = await state.client
          .from('project_tasks')
          .update({
            status: 'done',
            completed_at: new Date().toISOString(),
            completed_by: state.profile.id
          })
          .eq('id', task.id);

        if (error) {
          state.detail.isOpen = true;
          state.detail.kind = 'task-error';
          state.detail.id = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        renderApp();
      }

      async function handleStartTimerSubmit(event) {

        const projectId = String(formData.get('project_id') || '').trim();

        state.timeTracker.isSubmitting = true;
        state.timeTracker.message = '';
        state.timeTracker.type = '';

            throw new Error('Stop the active timer before starting another one.');

            .from('time_entries')

              project_id: projectId,

          state.timeTracker.isSubmitting = false;
          state.timeTracker.type = 'success';

          state.timeTracker.isSubmitting = false;
          state.timeTracker.type = 'error';

      async function handleStopTimer(timeEntryId) {
        const entry = state.timeEntries.find((item) => item.id === timeEntryId);
        if (!entry || entry.user_id !== state.profile?.id || entry.status !== 'running') {
          return;
        }

        const { error } = await state.client
          .from('time_entries')
          .update({
            ended_at: new Date().toISOString(),
            status: 'stopped'
          })
          .eq('id', entry.id);

        if (error) {
          state.timeTracker.type = 'error';
          state.timeTracker.message = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        state.timeTracker.type = 'success';
        state.timeTracker.message = 'Timer stopped. You can convert it to a Work Log.';
        renderApp();
      }

      function openWorkLogFromTimeEntry(timeEntryId) {
        const entry = state.timeEntries.find((item) => item.id === timeEntryId);
        if (!entry || entry.user_id !== state.profile?.id || !['stopped', 'converted'].includes(entry.status)) {
          return;
        }

        const durationMinutes = timeEntryDurationMinutes(entry);
        state.workLog.isOpen = true;
        state.workLog.message = '';
        state.workLog.type = '';
        state.workLog.prefill = {
          timeEntryId: entry.id,
          project_id: entry.project_id,
          work_type: 'Other',
          work_date: entry.started_at ? new Date(entry.started_at).toISOString().slice(0, 10) : todayISO(),
          hours_used: Math.max(0.01, durationMinutes / 60).toFixed(2),
          title: entry.task?.title || 'Tracked work',
          description: entry.description || entry.task?.title || 'Tracked work from Bastida OS timer.',
          evidence_url: '',
          commit_hash: ''
        };
        renderApp();
      }

        const scope = normalizeDocumentScope(formData.get('document_scope'));

      async function handleApproveWorkLogSubmit(event) {
        event.preventDefault();
        const formData = new FormData(event.currentTarget);
        const log = state.workLogs.find((item) => item.id === state.approval.logId);
        const approvedHours = Number(formData.get('approved_hours'));

        if (!log || !canReviewWorkLog(log)) {
          return;
        }

        if (!Number.isFinite(approvedHours) || approvedHours < 0 || approvedHours > toNumber(log.hours_used)) {
          state.approval.message = `Approved hours must be between 0 and ${formatHours(log.hours_used)}.`;
          state.approval.type = 'error';
          renderApp();
          return;
        }

        state.approval.isSubmitting = true;
        state.approval.message = '';
        state.approval.type = '';
        renderApp();

        await handleApproveWorkLog(log.id, approvedHours);
      }

      async function handleApproveWorkLog(logId, approvedHours) {
        const log = state.workLogs.find((item) => item.id === logId);
        if (!log || !canReviewWorkLog(log)) {
          return;
        }

        const { error } = await state.client
          .from('work_logs')
          .update({
            status: 'approved',
            approved_by: state.profile.id,
            approved_at: new Date().toISOString(),
            approved_hours: approvedHours,
            rejected_by: null,
            rejected_at: null,
            rejection_reason: null
          })
          .eq('id', log.id);

        if (error) {
          state.approval.isOpen = true;
          state.approval.logId = log.id;
          state.approval.isSubmitting = false;
          state.approval.type = 'error';
          state.approval.message = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        state.approval.isOpen = false;
        state.approval.logId = null;
        state.approval.isSubmitting = false;
        renderApp();
      }

      function setActiveView(view) {
        if (!viewLabels[view]) {
          return;
        }

        state.activeView = view;
        app.querySelectorAll('[data-nav]').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.nav === view);
        });
        app.querySelectorAll('[data-view]').forEach((section) => {
          section.classList.toggle('is-active', section.dataset.view === view);
        });
        const title = app.querySelector('[data-view-title]');
        if (title) {
          title.textContent = viewLabels[view];
        }
        const mobileNav = app.querySelector('[data-mobile-nav]');
        if (mobileNav) {
          mobileNav.value = view;
        }
      }

      function buildDashboardOverview() {
        const projects = visibleProjects();
        const workLogs = dashboardWorkLogs();
        const payments = dashboardPayments();
        const paymentHistory = dashboardPaymentHistory();
        const deliverables = dashboardDeliverables();
        const documents = dashboardDocuments();
        const tasks = dashboardTasks();
        const timeEntries = dashboardTimeEntries();
        const projectRoles = dashboardProjectRoles();
        const payableRows = buildPayableRowsForData(workLogs, payments);
        const totalPayable = payableRows.reduce((total, payment) => total + toNumber(payment.total_usd), 0);
        const totalPaid = payments
          .filter((payment) => normalizePaymentStatus(payment.status) === 'paid')
          .reduce((total, payment) => total + toNumber(payment.total_usd), 0);
        const approvedHours = workLogs.reduce((total, log) => total + approvedHoursForLog(log), 0);
        const openDeliverables = deliverables.filter((deliverable) => isOpenDeliverable(deliverable)).length;
        const completedDeliverables = deliverables.filter((deliverable) => isCompletedDeliverable(deliverable)).length;
        const pendingWorkLogs = workLogs.filter((log) => log.status === 'pending_approval' && log.worker_user_id === state.profile?.id).length;
        const activeDocuments = documents.filter((document) => document.status !== 'archived').length;
        const managedProjectIds = dashboardManagedProjectIds();
        const canShowCollaboratorBreakdown = managedProjectIds.size > 0;
        const personalOnly = !canShowCollaboratorBreakdown;
        const activity = buildDashboardActivityItems({
          workLogs,
          deliverables,
          tasks,
          timeEntries,
          documents,
          paymentHistory,
          projectRoles,
          personalOnly
        });

        return {
          title: dashboardOverviewTitle(canShowCollaboratorBreakdown),
          copy: dashboardOverviewCopy(canShowCollaboratorBreakdown),
          scopeLabel: isAllWorkspaceActive() ? workspaceOverviewLabel() : activeWorkspaceOption()?.projectName || t('dashboard.projectFallback'),
          modeLabel: personalOnly ? t('dashboard.personalScope') : t('dashboard.managedScope'),
          personalOnly,
          canShowCollaboratorBreakdown,
          projects,
          workLogs,
          payments,
          paymentHistory,
          deliverables,
          documents,
          tasks,
          timeEntries,
          projectRoles,
          payableRows,
          projectRows: buildDashboardProjectRows(projects, payableRows, payments, workLogs, deliverables, documents, tasks, timeEntries, projectRoles),
          collaboratorRows: canShowCollaboratorBreakdown ? buildDashboardCollaboratorRows(managedProjectIds) : [],
          activity,
          totals: {
            approvedHours,
            totalPayable,
            totalPaid,
            pendingBalance: Math.max(0, totalPayable - totalPaid),
            openDeliverables,
            completedDeliverables,
            documents: activeDocuments,
            pendingWorkLogs,
            activity: activity.length,
            activeCollaborators: dashboardActiveCollaboratorCount(managedProjectIds)
          }
        };
      }

      function dashboardOverviewTitle(canShowCollaboratorBreakdown) {
        const active = activeWorkspaceOption();
        if (!isAllWorkspaceActive()) {
          return `${active?.projectName || t('dashboard.projectFallback')} ${t('dashboard.projectSuffix')}`;
        }

        if (isGlobalFounderOrAdmin()) {
          return t('dashboard.allTitle');
        }

        return canShowCollaboratorBreakdown ? t('workspace.allMine') : t('dashboard.myTitle');
      }

      function dashboardOverviewCopy(canShowCollaboratorBreakdown) {
        const active = activeWorkspaceOption();
        if (!isAllWorkspaceActive()) {
          return t('dashboard.projectCopy').replace('{project}', active?.projectName || t('dashboard.selectedProject'));
        }

        if (isGlobalFounderOrAdmin()) {
          return t('dashboard.allCopy');
        }

        if (canShowCollaboratorBreakdown) {
          return t('dashboard.managedCopy');
        }

        return t('dashboard.myCopy');
      }

          { label: 'Open Deliverables', value: totals.openDeliverables, caption: 'Planned, in progress, or delivered.' },
          { label: 'Completed Deliverables', value: totals.completedDeliverables, caption: 'Approved or completed deliverables.' },
