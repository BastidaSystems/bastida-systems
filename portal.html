<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastida OS | Bastida Systems</title>
  <meta name="description" content="Private Bastida Systems operating portal for collaborators, projects, work logs, deliverables, and payments.">
  <link rel="icon" type="image/png" href="img/logo_bastida_sys.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-muted: #f4f5f7;
      --text: #111827;
      --text-soft: #4b5563;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --accent: #111827;
      --success: #0f766e;
      --warning: #92400e;
      --danger: #b91c1c;
      --radius: 8px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      font-weight: 700;
      font-size: 13px;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .brand-subtitle {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-soft);
      padding: 9px 10px;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-button:hover {
      background: var(--surface-muted);
      color: var(--text);
    }

    .nav-button.is-active {
      background: #111827;
      color: #ffffff;
    }

    .nav-count {
      display: inline-flex;
      min-width: 24px;
      justify-content: center;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.08);
      color: inherit;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 700;
    }

    .nav-button.is-active .nav-count {
      background: rgba(255, 255, 255, 0.16);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      padding: 24px 28px 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 44px;
      margin-bottom: 28px;
    }

    .page-kicker {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-title {
      margin: 3px 0 0;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .page-copy {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.65;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .profile-meta {
      min-width: 0;
      text-align: right;
    }

    .profile-name {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-role {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 13px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .button:hover {
      border-color: #9ca3af;
    }

    .button-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .section-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }

    .field-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .notice-success {
      border-color: rgba(15, 118, 110, 0.18);
      background: rgba(15, 118, 110, 0.07);
      color: var(--success);
    }

    .notice-error {
      border-color: rgba(185, 28, 28, 0.18);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.32);
      padding: 18px;
    }

    .modal {
      width: min(100%, 520px);
      max-height: min(760px, calc(100vh - 36px));
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .modal-header {
      border-bottom: 1px solid var(--line);
    }

    .modal-footer {
      border-top: 1px solid var(--line);
    }

    .modal-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .modal-copy {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 24px 0 14px;
    }

    .toolbar-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .toolbar-copy {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 17px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .metric-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .metric-value {
      margin: 12px 0 0;
      color: var(--text);
      font-size: 28px;
      font-weight: 750;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .metric-caption {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-wide {
      grid-column: 1 / -1;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding: 15px 16px;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 13px 16px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #fbfbfc;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    td {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.45;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .cell-title {
      display: block;
      color: var(--text);
      font-weight: 700;
      line-height: 1.35;
    }

    .cell-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fafafa;
      color: var(--text-soft);
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-active,
    .status-approved,
    .status-paid,
    .status-completed,
    .status-active_member {
      border-color: rgba(15, 118, 110, 0.18);
      background: rgba(15, 118, 110, 0.07);
      color: var(--success);
    }

    .status-paused,
    .status-pending,
    .status-pending_approval,
    .status-in_progress,
    .status-invite_sent,
    .status-pending_acceptance {
      border-color: rgba(146, 64, 14, 0.18);
      background: rgba(146, 64, 14, 0.07);
      color: var(--warning);
    }

    .status-archived,
    .status-void,
    .status-error_sending_invite {
      border-color: rgba(185, 28, 28, 0.16);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }

    .role-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .role-pill {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: grid;
      place-items: center;
      min-height: 240px;
      padding: 38px 20px;
      text-align: center;
    }

    .empty-state.compact {
      min-height: 170px;
    }

    .empty-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

    .empty-copy {
      max-width: 420px;
      margin: 8px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .error-state {
      border: 1px solid rgba(185, 28, 28, 0.18);
      border-radius: var(--radius);
      background: rgba(185, 28, 28, 0.05);
    }

    .error-state .empty-title {
      color: var(--danger);
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .auth-wall {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-panel {
      width: min(100%, 460px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-panel h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    .auth-panel p {
      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .mobile-nav {
      display: none;
      width: 100%;
      margin: 0 0 20px;
    }

    .mobile-nav select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1040px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .main {
        padding: 18px 16px 34px;
      }

      .mobile-nav {
        display: block;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .profile {
        width: 100%;
        justify-content: space-between;
      }

      .profile-meta {
        text-align: left;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .panel-header {
        flex-direction: column;
      }

      table {
        min-width: 640px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-state">
      <div>
        <p class="empty-title">Loading Bastida OS</p>
        <p class="empty-copy">Validating your Supabase session.</p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const app = document.getElementById('app');
      const authRedirects = window.BASTIDA_AUTH_REDIRECTS || {};
      const config = window.BASTIDA_SUPABASE_CONFIG || {};
      const viewLabels = {
        dashboard: 'Dashboard',
        people: 'People',
        projects: 'Projects',
        deliverables: 'Deliverables',
        workLogs: 'Work Logs',
        payments: 'Payments'
      };
      const roleLabels = {
        founder: 'Founder',
        owner: 'Owner',
        core_collaborator: 'Core Collaborator',
        contractor: 'Contractor'
      };
      const state = {
        client: null,
        session: null,
        authUser: null,
        profile: null,
        activeView: 'dashboard',
        projects: [],
        projectRoles: [],
        deliverables: [],
        workLogs: [],
        payments: [],
        invite: {
          isOpen: false,
          isSubmitting: false,
          message: '',
          type: ''
        },
        createProject: {
          isOpen: false,
          isSubmitting: false,
          message: '',
          type: ''
        },
        isLoading: true,
        error: null
      };

      const moneyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 2
      });
      const numberFormatter = new Intl.NumberFormat('en-US', {
        maximumFractionDigits: 2
      });
      const dateFormatter = new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });

      init();

      async function init() {
        try {
          state.client = createSupabaseClient();
          const { data, error } = await state.client.auth.getSession();

          if (error) {
            throw error;
          }

          state.session = data.session;

          if (!state.session) {
            renderSignedOut();
            return;
          }

          const userResponse = await state.client.auth.getUser();
          if (userResponse.error) {
            throw userResponse.error;
          }

          state.authUser = userResponse.data.user;
          await loadPortalData();
          renderApp();
        } catch (error) {
          state.error = error;
          renderFatalError(error);
        }
      }

      function createSupabaseClient() {
        if (!window.supabase || !window.supabase.createClient) {
          throw new Error('Supabase client library did not load.');
        }

        if (!config.url || !config.anonKey) {
          throw new Error('Supabase configuration is missing. Add SUPABASE_URL and SUPABASE_ANON_KEY in supabase-config.js.');
        }

        const supabaseUrl = String(config.url)
          .replace(/\/rest\/v1\/?$/i, '')
          .replace(/\/$/, '');

        return window.supabase.createClient(supabaseUrl, config.anonKey);
      }

      async function loadPortalData() {
        state.isLoading = true;
        state.error = null;

        const profileResult = await state.client
          .from('users')
          .select('id, auth_user_id, email, full_name, platform_role, active')
          .eq('auth_user_id', state.authUser.id)
          .maybeSingle();

        if (profileResult.error) {
          throw profileResult.error;
        }

        state.profile = profileResult.data;
        await acceptPendingInvites();

        const [projects, roles, deliverables, workLogs, payments] = await Promise.all([
          state.client
            .from('projects')
            .select('id, slug, name, description, status, created_at, updated_at')
            .order('created_at', { ascending: false }),
          state.client
            .from('project_roles')
            .select('id, project_id, user_id, role, hourly_rate_usd, active, invite_email, invited_name, invited_at, invitation_status, last_invite_error, accepted_at, joined_at, member:users!project_roles_user_id_fkey(id, full_name, email, platform_role), project:projects!project_roles_project_id_fkey(id, name, status)')
            .order('joined_at', { ascending: false }),
          state.client
            .from('deliverables')
            .select('id, project_id, title, description, status, due_date, delivered_at, created_at, project:projects!deliverables_project_id_fkey(id, name)')
            .order('created_at', { ascending: false }),
          state.client
            .from('work_logs')
            .select('id, project_id, title, description, work_date, hours_used, commit_hash, status, is_billable, worker:users!work_logs_worker_user_id_fkey(id, full_name, email), project:projects!work_logs_project_id_fkey(id, name, status)')
            .order('work_date', { ascending: false }),
          state.client
            .from('collaborator_payments')
            .select('id, project_id, user_id, hourly_rate_usd, approved_hours, total_usd, status, paid_at, created_at, collaborator:users!collaborator_payments_user_id_fkey(id, full_name, email), project:projects!collaborator_payments_project_id_fkey(id, name)')
            .order('created_at', { ascending: false })
        ]);

        assertQuery('projects', projects);
        assertQuery('project_roles', roles);
        assertQuery('deliverables', deliverables);
        assertQuery('work_logs', workLogs);
        assertQuery('collaborator_payments', payments);

        state.projects = projects.data || [];
        state.projectRoles = roles.data || [];
        state.deliverables = deliverables.data || [];
        state.workLogs = workLogs.data || [];
        state.payments = payments.data || [];
        state.isLoading = false;
      }

      async function acceptPendingInvites() {
        if (!state.profile?.id) {
          return;
        }

        const { error } = await state.client.rpc('accept_my_project_invites');
        if (error) {
          throw error;
        }
      }

      function assertQuery(tableName, result) {
        if (!result.error) {
          return;
        }

        const error = new Error(`${tableName}: ${result.error.message}`);
        error.details = result.error.details;
        error.hint = result.error.hint;
        throw error;
      }

      function renderSignedOut() {
        app.innerHTML = `
          <main class="auth-wall">
            <section class="auth-panel" aria-labelledby="auth-title">
              <p class="page-kicker">Bastida Systems</p>
              <h1 id="auth-title">Sign in required</h1>

              <h1 id="error-title">Portal is not ready</h1>

              </div>
            </section>
          </main>
        `;
        app.querySelector('[data-retry]')?.addEventListener('click', init);

      function formatOperationalError(error) {
        const message = error?.message || 'Unknown Supabase error.';

        if (/projects|project_roles|deliverables|collaborator_payments|work_logs/i.test(message)) {
          return `${message}. Run supabase/bastida_operating_system_schema.sql in Supabase SQL Editor, then refresh.`;

        return message;

      function navButton(view, label) {
        const count = getViewCount(view);
        return `

      function bindAppEvents() {
        app.querySelectorAll('[data-nav]').forEach((button) => {
          button.addEventListener('click', () => setActiveView(button.dataset.nav));
        });

        app.querySelector('[data-mobile-nav]')?.addEventListener('change', (event) => {
          setActiveView(event.target.value);
        });

        app.querySelectorAll('[data-open-invite]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = true;
            state.invite.message = '';
            state.invite.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-open-create-project]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = false;
            state.createProject.isOpen = true;
            state.createProject.message = '';
            state.createProject.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-invite]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = false;
            state.invite.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-create-project]').forEach((button) => {
          button.addEventListener('click', () => {
            state.createProject.isOpen = false;
            state.createProject.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelector('[data-invite-form]')?.addEventListener('submit', handleInviteSubmit);
        app.querySelector('[data-create-project-form]')?.addEventListener('submit', handleCreateProjectSubmit);

        app.querySelector('[data-refresh]')?.addEventListener('click', async (event) => {
          event.currentTarget.textContent = 'Refreshing';
          event.currentTarget.disabled = true;
          try {
            await loadPortalData();
            renderApp();
          } catch (error) {
            renderFatalError(error);
          }
        });

        app.querySelector('[data-sign-out]')?.addEventListener('click', async () => {
          await state.client.auth.signOut();
          window.location.href = authRedirects.login || 'login.html';
        });

      async function handleCreateProjectSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.createProject.isSubmitting = true;
        state.createProject.message = '';
        state.createProject.type = '';
        renderApp();

        try {
          const body = {
            name: String(formData.get('name') || '').trim(),
            slug: String(formData.get('slug') || '').trim() || null,
            description: String(formData.get('description') || '').trim() || null
          };

          const { data, error } = await state.client.functions.invoke('create-project', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error creating project.');
          }

          await loadPortalData();
          state.activeView = 'projects';
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'success';
          state.createProject.message = data?.message || 'Project created';
          renderApp();
        } catch (error) {
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'error';
          state.createProject.message = error instanceof Error ? error.message : 'Error creating project';
          renderApp();
        }
      }

      async function handleInviteSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.invite.isSubmitting = true;
        state.invite.message = '';
        state.invite.type = '';
        renderApp();

        try {
          const hourlyRateValue = String(formData.get('hourly_rate_usd') || '').trim();
          const body = {
            name: String(formData.get('name') || '').trim(),
            email: String(formData.get('email') || '').trim(),
            project_id: String(formData.get('project_id') || '').trim(),
            role: String(formData.get('role') || '').trim(),
            hourly_rate_usd: hourlyRateValue ? Number(hourlyRateValue) : null
          };

          const { data, error } = await state.client.functions.invoke('invite-member', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error sending invite.');
          }

          await loadPortalData();
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'success';
          state.invite.message = data?.message || 'Invite sent';
          renderApp();
        } catch (error) {
          try {
            await loadPortalData();
          } catch (_) {
            // Keep the original invite error visible if refresh fails.
          }
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'error';
          state.invite.message = error instanceof Error ? error.message : 'Error sending invite';
          renderApp();
        }
      }

      function setActiveView(view) {
        if (!viewLabels[view]) {

        state.activeView = view;
        app.querySelectorAll('[data-nav]').forEach((button) => {

        app.querySelectorAll('[data-view]').forEach((section) => {

        if (mobileNav) {

        }

      function buildPeople() {
        const people = new Map();

        state.projectRoles.forEach((assignment) => {
          const member = assignment.member;
          const identity = member?.id || assignment.invite_email || assignment.id;
          if (!identity) {
            return;
          }

          if (!people.has(identity)) {
            people.set(identity, {
              id: identity,
              name: member?.full_name || assignment.invited_name || member?.email || assignment.invite_email || 'Invited member',
              email: member?.email || assignment.invite_email || '',
              defaultRole: assignment.role,
              roles: [],
              projects: [],
              status: normalizeInvitationStatus(assignment)
            });
          }

          const person = people.get(identity);
          if (assignment.role && !person.roles.includes(assignment.role)) {
            person.roles.push(assignment.role);
          }
          if (assignment.project?.id && !person.projects.includes(assignment.project.id)) {
            person.projects.push(assignment.project.id);
          }
          person.status = mergeInvitationStatus(person.status, normalizeInvitationStatus(assignment));
        });

        return Array.from(people.values()).sort((a, b) => a.name.localeCompare(b.name));
      }

        return `
          <div class="modal-backdrop" role="presentation">
            <section class="modal" role="dialog" aria-modal="true" aria-labelledby="invite-title">
              <form data-invite-form>
                <div class="modal-header">
                  <div>
                    <h2 class="modal-title" id="invite-title">Invite Collaborator</h2>
                    <p class="modal-copy">Send a real Supabase Auth invitation for a real project role.</p>
                  </div>
                  <button class="button" type="button" data-close-invite>Close</button>
                </div>
                <div class="modal-body">
                  ${notice}
                  ${noProjectsNotice}
                  <div class="form-grid">
                    <div class="field">
                      <label for="invite-name">Name</label>
                      <input id="invite-name" name="name" type="text" autocomplete="name" required>
                    </div>
                    <div class="field">
                      <label for="invite-email">Email</label>
                      <input id="invite-email" name="email" type="email" autocomplete="email" required>
                    </div>
                    <div class="field">
                      <label for="invite-project">Project</label>
                      <select id="invite-project" name="project_id" required>
                        ${projects.length
                          ? projects.map((project) => `<option value="${escapeAttr(project.id)}">${escapeHtml(project.name)}</option>`).join('')
                          : '<option value="">No projects available</option>'}
                      </select>
                    </div>
                    <div class="field">
                      <label for="invite-role">Role</label>
                      <select id="invite-role" name="role" required>
                        <option value="core_collaborator">Core Collaborator</option>
                        <option value="contractor">Contractor</option>
                        <option value="owner">Owner</option>
                        <option value="founder">Founder</option>
                      </select>
                    </div>
                    <div class="field">
                      <label for="invite-hourly-rate">Hourly rate optional</label>
                      <input id="invite-hourly-rate" name="hourly_rate_usd" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00">
                      <p class="field-hint">Stored on the project role. Leave empty if this member does not have a fixed hourly rate yet.</p>
                    </div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="button" type="button" data-close-invite>Cancel</button>
                  <button class="button button-primary" type="submit" ${state.invite.isSubmitting || !projects.length ? 'disabled' : ''}>
                    ${state.invite.isSubmitting ? 'Sending invite' : 'Send invitation'}
                  </button>
                </div>
              </form>
            </section>
          </div>
        `;
      }

      function metricCard(label, value, caption) {
        return `
          <section class="metric">
            <p class="metric-label">${escapeHtml(label)}</p>
            <p class="metric-value">${escapeHtml(String(value))}</p>
            <p class="metric-caption">${escapeHtml(caption)}</p>
          </section>
        `;
      }

      function emptyState(title, copy, compact = false) {
        return `
          <div class="empty-state ${compact ? 'compact' : ''}">
            <div>
              <p class="empty-title">${escapeHtml(title)}</p>
              <p class="empty-copy">${escapeHtml(copy)}</p>
            </div>
          </div>
        `;
      }

      function statusPill(status) {
        const normalized = String(status || 'unknown').toLowerCase();
        return `<span class="status status-${escapeAttr(normalized)}">${escapeHtml(labelize(normalized))}</span>`;
      }

      function getViewCount(view) {
        if (view === 'people') {
          return buildPeople().length;
        }
        if (view === 'projects') {
          return state.projects.length;
        }
        if (view === 'deliverables') {
          return state.deliverables.length;
        }
        if (view === 'workLogs') {
          return state.workLogs.length;
        }
        if (view === 'payments') {
          return state.payments.length;
        }
        return '';
      }

      function canInviteMembers() {
        return canManageWorkspace();
      }

      function canCreateProjects() {
        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        return state.projectRoles.some((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
          && assignment.role === 'founder'
        ));
      }

      function canManageWorkspace() {
        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        return state.projectRoles.some((assignment) => (
          assignment.user_id === state.profile?.id
          && assignment.active === true
          && ['founder', 'owner'].includes(assignment.role)
        ));
      }

      function isGlobalFounderOrAdmin() {
        return ['platform_admin', 'founder'].includes(state.profile?.platform_role);
      }

      function invitableProjects() {
        if (isGlobalFounderOrAdmin()) {
          return state.projects;
        }

        const projectIds = new Set(
          state.projectRoles
            .filter((assignment) => assignment.user_id === state.profile?.id)
            .filter((assignment) => assignment.active === true)
            .filter((assignment) => ['founder', 'owner'].includes(assignment.role))
            .map((assignment) => assignment.project_id)
        );

        return state.projects.filter((project) => projectIds.has(project.id));
      }

      function normalizeInvitationStatus(assignment) {
        if (assignment.invitation_status) {
          return assignment.invitation_status;
        }

        return assignment.active ? 'active_member' : 'pending_acceptance';
      }

      function mergeInvitationStatus(currentStatus, nextStatus) {
        const priority = {
          error_sending_invite: 4,
          pending_acceptance: 3,
          invite_sent: 2,
          active_member: 1
        };

        return (priority[nextStatus] || 0) > (priority[currentStatus] || 0) ? nextStatus : currentStatus;
      }

      function profileName() {
        return state.profile?.full_name || state.authUser?.email || 'Authenticated user';
      }

      function profileRole() {
        return labelize(state.profile?.platform_role || 'authenticated');
      }

      function roleLabel(role) {
        return roleLabels[role] || labelize(role || 'collaborator');
      }

      function labelize(value) {
        return String(value || '')
          .replace(/_/g, ' ')
          .replace(/\b\w/g, (character) => character.toUpperCase());
      }

      function formatMoney(value) {
        return moneyFormatter.format(toNumber(value));
      }

      function formatHours(value) {
        return numberFormatter.format(toNumber(value));
      }

      function formatDate(value) {
        if (!value) {
          return '-';
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '-';
        }

        return dateFormatter.format(date);
      }

      function toNumber(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#096;');
      }
    })();
  </script>
</body>
</html>
