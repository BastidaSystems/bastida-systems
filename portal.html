<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastida OS | Bastida Systems</title>
  <meta name="description" content="Private Bastida Systems operating portal for collaborators, projects, work logs, deliverables, and payments.">
  <link rel="icon" type="image/png" href="img/logo_bastida_sys.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-strong: #f1f5f9;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --line-strong: #cbd5e1;
      --accent: #1d4ed8;
      --accent-strong: #172554;
      --success: #047857;
      --warning: #b45309;
      --danger: #dc2626;
      --info: #2563eb;
      --radius: 8px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-soft: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(29, 78, 216, 0.18);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      color: var(--accent-strong);
      box-shadow: var(--shadow-soft);
      font-weight: 700;
      font-size: 13px;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .brand-subtitle {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-soft);
      padding: 10px 11px;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      background: #eef4ff;
      color: var(--text);
    }

    .nav-button.is-active {
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
    }

    .nav-count {
      display: inline-flex;
      min-width: 24px;
      justify-content: center;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.08);
      color: inherit;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 700;
    }

    .nav-button.is-active .nav-count {
      background: rgba(255, 255, 255, 0.16);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      padding: 26px 30px 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 44px;
      margin-bottom: 26px;
    }

    .page-kicker {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-title {
      margin: 3px 0 0;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .page-copy {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.6;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .profile-meta {
      min-width: 0;
      text-align: right;
    }

    .profile-name {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-role {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 13px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .button:hover {
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    .button-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button-ghost {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .button-small {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .button-danger {
      border-color: rgba(220, 38, 38, 0.2);
      color: var(--danger);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .section-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .field textarea {
      min-height: 86px;
      padding: 10px 12px;
      resize: vertical;
      line-height: 1.45;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .field-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .notice-success {
      border-color: rgba(15, 118, 110, 0.18);
      background: rgba(15, 118, 110, 0.07);
      color: var(--success);
    }

    .notice-error {
      border-color: rgba(185, 28, 28, 0.18);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.32);
      padding: 18px;
    }

    .modal {
      width: min(100%, 520px);
      max-height: min(760px, calc(100vh - 36px));
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
    }

    .modal-wide {
      width: min(100%, 760px);
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .modal-header {
      border-bottom: 1px solid var(--line);
    }

    .modal-footer {
      border-top: 1px solid var(--line);
    }

    .modal-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .modal-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
    }

    .modal-copy {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 24px 0 14px;
    }

    .toolbar-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .toolbar-copy {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .metric {
      position: relative;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 18px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), rgba(29, 78, 216, 0));
    }

    .metric-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .metric-value {
      margin: 12px 0 0;
      color: var(--text);
      font-size: 30px;
      font-weight: 760;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .metric-caption {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 380px);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-wide {
      grid-column: 1 / -1;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    .table-compact {
      min-width: 0;
      table-layout: fixed;
    }

    .table-compact th:nth-child(1),
    .table-compact td:nth-child(1) {
      width: 74px;
    }

    .table-compact th:nth-child(2),
    .table-compact td:nth-child(2) {
      width: 110px;
    }

    .table-compact th:nth-child(4),
    .table-compact td:nth-child(4),
    .table-compact th:nth-child(5),
    .table-compact td:nth-child(5) {
      width: 86px;
    }

    .table-compact th:nth-child(6),
    .table-compact td:nth-child(6) {
      width: 132px;
    }

    .table-compact th:nth-child(7),
    .table-compact td:nth-child(7) {
      width: 136px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    td {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.45;
    }

    tbody tr {
      transition: background 140ms ease;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .cell-title {
      display: block;
      color: var(--text);
      font-weight: 700;
      line-height: 1.35;
    }

    .cell-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .truncate {
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-subtitle.truncate {
      display: block;
    }

    .cell-muted {
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fafafa;
      color: var(--text-soft);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-active,
    .status-approved,
    .status-paid,
    .status-completed,
    .status-active_member {
      border-color: rgba(15, 118, 110, 0.18);
      background: rgba(15, 118, 110, 0.07);
      color: var(--success);
    }

    .status-delivered,
    .status-paused,
    .status-pending,
    .status-pending_approval,
    .status-in_progress,
    .status-invite_sent,
    .status-pending_acceptance {
      border-color: rgba(146, 64, 14, 0.18);
      background: rgba(146, 64, 14, 0.07);
      color: var(--warning);
    }

    .status-planned,
    .status-draft {
      border-color: rgba(37, 99, 235, 0.18);
      background: rgba(37, 99, 235, 0.07);
      color: var(--info);
    }

    .status-archived,
    .status-void,
    .status-rejected,
    .status-error_sending_invite {
      border-color: rgba(185, 28, 28, 0.16);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }

    .role-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .role-pill {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--text-soft);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: grid;
      place-items: center;
      min-height: 240px;
      padding: 42px 20px;
      text-align: center;
    }

    .empty-state.compact {
      min-height: 170px;
    }

    .empty-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

    .empty-copy {
      max-width: 420px;
      margin: 8px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .empty-copy-flush {
      margin: 0;
    }

    .empty-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin: 0 auto 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      color: var(--accent);
      font-weight: 800;
    }

    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      padding: 0 9px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .activity-feed {
      display: grid;
      gap: 0;
    }

    .activity-item {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .activity-item:last-child {
      border-bottom: 0;
    }

    .activity-dot {
      width: 9px;
      height: 9px;
      margin-top: 5px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }

    .activity-title {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.35;
    }

    .activity-meta {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .organization-tree {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .org-root {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border: 1px solid rgba(29, 78, 216, 0.18);
      border-radius: var(--radius);
      background: #eff6ff;
      color: var(--accent-strong);
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .org-project {
      border-left: 2px solid var(--line);
      padding-left: 16px;
    }

    .org-project-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .org-project-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-muted);
    }

    .org-project-title {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .org-role-row {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .org-role-row:last-child {
      border-bottom: 0;
    }

    .person-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .person-chip {
      display: inline-flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 7px 9px;
      min-width: 150px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-muted);
      padding: 12px;
    }

    .detail-label {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .detail-value {
      margin: 6px 0 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

    .detail-card-spaced {
      margin-top: 12px;
    }

    .detail-card-body {
      margin-top: 8px;
    }

    .error-state {
      border: 1px solid rgba(185, 28, 28, 0.18);
      border-radius: var(--radius);
      background: rgba(185, 28, 28, 0.05);
    }

    .error-state .empty-title {
      color: var(--danger);
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .auth-wall {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-panel {
      width: min(100%, 460px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-panel h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    .auth-panel p {
      margin: 10px 0 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .mobile-nav {
      display: none;
      width: 100%;
      margin: 0 0 20px;
    }

    .mobile-nav select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1040px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid,
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .main {
        padding: 18px 16px 34px;
      }

      .mobile-nav {
        display: block;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .profile {
        width: 100%;
        justify-content: space-between;
      }

      .profile-meta {
        text-align: left;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .panel-header {
        flex-direction: column;
      }

      .detail-grid,
      .org-role-row {
        grid-template-columns: 1fr;
      }

      table {
        min-width: 640px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-state">
      <div>
        <p class="empty-title">Loading Bastida OS</p>
        <p class="empty-copy">Validating your Supabase session.</p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const app = document.getElementById('app');
      const authRedirects = window.BASTIDA_AUTH_REDIRECTS || {};
      const config = window.BASTIDA_SUPABASE_CONFIG || {};
      const viewLabels = {
        dashboard: 'Dashboard',
        people: 'People',
        projects: 'Projects',
        organization: 'Organization',
        deliverables: 'Deliverables',
        workLogs: 'Work Logs',
        payments: 'Payments'
      };
      const roleLabels = {
        founder: 'Founder',
        owner: 'Owner',
        core_collaborator: 'Core Collaborator',
        contractor: 'Contractor'
      };
      const state = {
        client: null,
        session: null,
        authUser: null,
        profile: null,
        activeView: 'dashboard',
        projects: [],
        projectRoles: [],
        deliverables: [],
        workLogs: [],
        payments: [],
        paymentHistory: [],
        invite: {
          isOpen: false,
          isSubmitting: false,
          message: '',
          type: ''
        },
        createProject: {
          isOpen: false,
          isSubmitting: false,
          message: '',
          type: ''
        },
        deliverableEditor: {
          isOpen: false,
          deliverableId: null,
          isSubmitting: false,
          message: '',
          type: ''
        },
        workLog: {
          isOpen: false,
          isSubmitting: false,
          message: '',
          type: ''
        },
        approval: {
          isOpen: false,
          logId: null,
          isSubmitting: false,
          message: '',
          type: ''
        },
        rejection: {
          isOpen: false,
          logId: null,
          isSubmitting: false,
          message: '',
          type: ''
        },
        detail: {
          isOpen: false,
          kind: '',
          id: ''
        },
        isLoading: true,
        error: null
      };

      const moneyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 2
      });
      const numberFormatter = new Intl.NumberFormat('en-US', {
        maximumFractionDigits: 2
      });
      const dateFormatter = new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });

      init();

      async function init() {
        try {
          state.client = createSupabaseClient();
          const { data, error } = await state.client.auth.getSession();

          if (error) {
            throw error;
          }

          state.session = data.session;

          if (!state.session) {
            renderSignedOut();
            return;
          }

          const userResponse = await state.client.auth.getUser();
          if (userResponse.error) {
            throw userResponse.error;
          }

          state.authUser = userResponse.data.user;
          await loadPortalData();
          renderApp();
        } catch (error) {
          state.error = error;
          renderFatalError(error);
        }
      }

      function createSupabaseClient() {
        if (!window.supabase || !window.supabase.createClient) {
          throw new Error('Supabase client library did not load.');
        }

        if (!config.url || !config.anonKey) {
          throw new Error('Supabase configuration is missing. Add SUPABASE_URL and SUPABASE_ANON_KEY in supabase-config.js.');
        }

        const supabaseUrl = String(config.url)
          .replace(/\/rest\/v1\/?$/i, '')
          .replace(/\/$/, '');

        return window.supabase.createClient(supabaseUrl, config.anonKey);
      }

      async function loadPortalData() {
        state.isLoading = true;
        state.error = null;

        const profileResult = await state.client
          .from('users')
          .select('id, auth_user_id, email, full_name, platform_role, active')
          .eq('auth_user_id', state.authUser.id)
          .maybeSingle();

        if (profileResult.error) {
          throw profileResult.error;
        }

        state.profile = profileResult.data;
        await acceptPendingInvites();

        const [projects, roles, deliverables, workLogs, payments, paymentHistory] = await Promise.all([
          state.client
            .from('projects')
            .select('id, company_id, slug, name, description, status, created_at, updated_at')
            .order('created_at', { ascending: false }),
          state.client
            .from('project_roles')
            .select('id, project_id, user_id, role, hourly_rate_usd, active, invite_email, invited_name, invited_at, invitation_status, last_invite_error, accepted_at, joined_at, member:users!project_roles_user_id_fkey(id, full_name, email, platform_role), project:projects!project_roles_project_id_fkey(id, name, status)')
            .order('joined_at', { ascending: false }),
          state.client
            .from('deliverables')
            .select('id, project_id, title, description, storage_path, status, due_date, delivered_at, responsible_user_id, figma_url, google_drive_url, document_url, evidence_url, approved_by, approved_at, created_by, created_at, updated_at, project:projects!deliverables_project_id_fkey(id, name), responsible:users!deliverables_responsible_user_id_fkey(id, full_name, email), creator:users!deliverables_created_by_fkey(id, full_name, email), approver:users!deliverables_approved_by_fkey(id, full_name, email)')
            .order('created_at', { ascending: false }),
          state.client
            .from('work_logs')
            .select('id, company_id, project_id, title, description, category, work_type, work_date, hours_used, approved_hours, evidence_url, commit_hash, status, is_billable, submitted_at, approved_by, approved_at, rejected_by, rejected_at, rejection_reason, worker_user_id, worker:users!work_logs_worker_user_id_fkey(id, full_name, email), approver:users!work_logs_approved_by_fkey(id, full_name, email), rejecter:users!work_logs_rejected_by_fkey(id, full_name, email), project:projects!work_logs_project_id_fkey(id, name, status, company_id)')
            .order('work_date', { ascending: false }),
          state.client
            .from('collaborator_payments')
            .select('id, project_id, user_id, hourly_rate_usd, approved_hours, total_usd, status, paid_at, paid_by, notes, created_at, updated_at, collaborator:users!collaborator_payments_user_id_fkey(id, full_name, email), payer:users!collaborator_payments_paid_by_fkey(id, full_name, email), project:projects!collaborator_payments_project_id_fkey(id, name)')
            .order('created_at', { ascending: false }),
          state.client
            .from('collaborator_payment_history')
            .select('id, payment_id, previous_status, new_status, changed_by, changed_at, note, actor:users!collaborator_payment_history_changed_by_fkey(id, full_name, email), payment:collaborator_payments!collaborator_payment_history_payment_id_fkey(id, project_id, user_id, total_usd, project:projects!collaborator_payments_project_id_fkey(id, name), collaborator:users!collaborator_payments_user_id_fkey(id, full_name, email))')
            .order('changed_at', { ascending: false })
        ]);

        assertQuery('projects', projects);
        assertQuery('project_roles', roles);
        assertQuery('deliverables', deliverables);
        assertQuery('work_logs', workLogs);
        assertQuery('collaborator_payments', payments);
        assertQuery('collaborator_payment_history', paymentHistory);

        state.projects = projects.data || [];
        state.projectRoles = roles.data || [];
        state.deliverables = deliverables.data || [];
        state.workLogs = workLogs.data || [];
        state.payments = payments.data || [];
        state.paymentHistory = paymentHistory.data || [];
        state.isLoading = false;
      }

      async function acceptPendingInvites() {
        if (!state.profile?.id) {
          return;
        }

        const { error } = await state.client.rpc('accept_my_project_invites');
        if (error) {
          throw error;
        }
      }

      function assertQuery(tableName, result) {
        if (!result.error) {
          return;
        }

        const error = new Error(`${tableName}: ${result.error.message}`);
        error.details = result.error.details;
        error.hint = result.error.hint;
        throw error;
      }

      function renderSignedOut() {
        app.innerHTML = `
          <main class="auth-wall">
            <section class="auth-panel" aria-labelledby="auth-title">
              <p class="page-kicker">Bastida Systems</p>
              <h1 id="auth-title">Sign in required</h1>
              <p>Bastida OS is private. Sign in with your Supabase account or accept your invitation before opening the portal.</p>
              <div class="auth-actions">
                <a class="button button-primary" href="${escapeAttr(authRedirects.login || 'login.html')}">Open login</a>
                <a class="button" href="${escapeAttr(authRedirects.setPassword || 'set-password.html')}">Accept invitation</a>
              </div>
            </section>
          </main>
        `;
      }

      function renderFatalError(error) {
        app.innerHTML = `
          <main class="auth-wall">
            <section class="auth-panel" aria-labelledby="error-title">
              <p class="page-kicker">Bastida Systems</p>
              <h1 id="error-title">Portal is not ready</h1>
              <p>${escapeHtml(formatOperationalError(error))}</p>
              <div class="auth-actions">
                <button class="button button-primary" type="button" data-retry>Retry</button>
                <a class="button" href="${escapeAttr(authRedirects.login || 'login.html')}">Open login</a>
              </div>
            </section>
          </main>
        `;
        app.querySelector('[data-retry]')?.addEventListener('click', init);
      }

      function formatOperationalError(error) {
        const message = error?.message || 'Unknown Supabase error.';

        if (/projects|project_roles|deliverables|collaborator_payments|collaborator_payment_history|work_logs/i.test(message)) {
          return `${message}. Run supabase/bastida_operating_system_schema.sql in Supabase SQL Editor, then refresh.`;
        }

        return message;
      }

      function renderApp() {
        app.innerHTML = `
          <div class="app-shell">
            <aside class="sidebar" aria-label="Primary">
              <div class="brand">
                <div class="brand-mark">BS</div>
                <div class="brand-text">
                  <p class="brand-title">Bastida OS</p>
                  <p class="brand-subtitle">Operations portal</p>
                </div>
              </div>
              <nav class="nav">
                ${Object.entries(viewLabels).map(([view, label]) => navButton(view, label)).join('')}
              </nav>
              <div class="sidebar-footer">
                Real-time operating data from Supabase. No local records are generated in the browser.
              </div>
            </aside>
            <main class="main">
              <div class="mobile-nav">
                <select aria-label="Select section" data-mobile-nav>
                  ${Object.entries(viewLabels).map(([view, label]) => `<option value="${view}" ${view === state.activeView ? 'selected' : ''}>${label}</option>`).join('')}
                </select>
              </div>
              <header class="topbar">
                <div>
                  <p class="page-kicker">Bastida Systems</p>
                  <h1 class="page-title" data-view-title>${escapeHtml(viewLabels[state.activeView])}</h1>
                </div>
                <div class="profile">
                  <div class="profile-meta">
                    <p class="profile-name">${escapeHtml(profileName())}</p>
                    <p class="profile-role">${escapeHtml(profileRole())}</p>
                  </div>
                  <button class="button" type="button" data-refresh>Refresh</button>
                  <button class="button" type="button" data-sign-out>Logout</button>
                </div>
              </header>
              <section class="view ${state.activeView === 'dashboard' ? 'is-active' : ''}" data-view="dashboard">
                ${renderDashboard()}
              </section>
              <section class="view ${state.activeView === 'people' ? 'is-active' : ''}" data-view="people">
                ${renderPeople()}
              </section>
              <section class="view ${state.activeView === 'projects' ? 'is-active' : ''}" data-view="projects">
                ${renderProjects()}
              </section>
              <section class="view ${state.activeView === 'organization' ? 'is-active' : ''}" data-view="organization">
                ${renderOrganization()}
              </section>
              <section class="view ${state.activeView === 'deliverables' ? 'is-active' : ''}" data-view="deliverables">
                ${renderDeliverables()}
              </section>
              <section class="view ${state.activeView === 'workLogs' ? 'is-active' : ''}" data-view="workLogs">
                ${renderWorkLogs()}
              </section>
              <section class="view ${state.activeView === 'payments' ? 'is-active' : ''}" data-view="payments">
                ${renderPayments()}
              </section>
            </main>
            ${state.invite.isOpen ? renderInviteModal() : ''}
            ${state.createProject.isOpen ? renderCreateProjectModal() : ''}
            ${state.deliverableEditor.isOpen ? renderDeliverableModal() : ''}
            ${state.workLog.isOpen ? renderWorkLogModal() : ''}
            ${state.approval.isOpen ? renderApproveLogModal() : ''}
            ${state.rejection.isOpen ? renderRejectModal() : ''}
            ${state.detail.isOpen ? renderDetailsModal() : ''}
          </div>
        `;

        bindAppEvents();
      }

      function navButton(view, label) {
        const count = getViewCount(view);
        return `
          <button class="nav-button ${state.activeView === view ? 'is-active' : ''}" type="button" data-nav="${view}">
            <span>${escapeHtml(label)}</span>
            ${count === '' ? '' : `<span class="nav-count">${count}</span>`}
          </button>
        `;
      }

      function bindAppEvents() {
        app.querySelectorAll('[data-nav]').forEach((button) => {
          button.addEventListener('click', () => setActiveView(button.dataset.nav));
        });

        app.querySelector('[data-mobile-nav]')?.addEventListener('change', (event) => {
          setActiveView(event.target.value);
        });

        app.querySelectorAll('[data-open-invite]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = true;
            state.invite.message = '';
            state.invite.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-open-create-project]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = false;
            state.createProject.isOpen = true;
            state.createProject.message = '';
            state.createProject.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-open-work-log]').forEach((button) => {
          button.addEventListener('click', () => {
            state.workLog.isOpen = true;
            state.workLog.message = '';
            state.workLog.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-open-deliverable]').forEach((button) => {
          button.addEventListener('click', () => {
            state.deliverableEditor.isOpen = true;
            state.deliverableEditor.deliverableId = button.dataset.openDeliverable || null;
            state.deliverableEditor.message = '';
            state.deliverableEditor.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-invite]').forEach((button) => {
          button.addEventListener('click', () => {
            state.invite.isOpen = false;
            state.invite.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-create-project]').forEach((button) => {
          button.addEventListener('click', () => {
            state.createProject.isOpen = false;
            state.createProject.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-work-log]').forEach((button) => {
          button.addEventListener('click', () => {
            state.workLog.isOpen = false;
            state.workLog.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-deliverable]').forEach((button) => {
          button.addEventListener('click', () => {
            state.deliverableEditor.isOpen = false;
            state.deliverableEditor.deliverableId = null;
            state.deliverableEditor.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-approval]').forEach((button) => {
          button.addEventListener('click', () => {
            state.approval.isOpen = false;
            state.approval.logId = null;
            state.approval.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-reject]').forEach((button) => {
          button.addEventListener('click', () => {
            state.rejection.isOpen = false;
            state.rejection.logId = null;
            state.rejection.isSubmitting = false;
            renderApp();
          });
        });

        app.querySelector('[data-invite-form]')?.addEventListener('submit', handleInviteSubmit);
        app.querySelector('[data-create-project-form]')?.addEventListener('submit', handleCreateProjectSubmit);
        app.querySelector('[data-deliverable-form]')?.addEventListener('submit', handleDeliverableSubmit);
        app.querySelector('[data-work-log-form]')?.addEventListener('submit', handleWorkLogSubmit);
        app.querySelector('[data-approve-log-form]')?.addEventListener('submit', handleApproveWorkLogSubmit);
        app.querySelector('[data-reject-form]')?.addEventListener('submit', handleRejectSubmit);

        app.querySelectorAll('[data-open-approve-log]').forEach((button) => {
          button.addEventListener('click', () => {
            state.approval.isOpen = true;
            state.approval.logId = button.dataset.openApproveLog;
            state.approval.message = '';
            state.approval.type = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-approve-deliverable]').forEach((button) => {
          button.addEventListener('click', () => handleApproveDeliverable(button.dataset.approveDeliverable));
        });

        app.querySelectorAll('[data-mark-paid]').forEach((button) => {
          button.addEventListener('click', () => handleMarkPaymentPaid(button.dataset.markPaid));
        });

        app.querySelectorAll('[data-detail-kind]').forEach((button) => {
          button.addEventListener('click', () => {
            state.detail.isOpen = true;
            state.detail.kind = button.dataset.detailKind;
            state.detail.id = button.dataset.detailId;
            renderApp();
          });
        });

        app.querySelectorAll('[data-close-detail]').forEach((button) => {
          button.addEventListener('click', () => {
            state.detail.isOpen = false;
            state.detail.kind = '';
            state.detail.id = '';
            renderApp();
          });
        });

        app.querySelectorAll('[data-reject-log]').forEach((button) => {
          button.addEventListener('click', () => {
            state.rejection.isOpen = true;
            state.rejection.logId = button.dataset.rejectLog;
            state.rejection.message = '';
            state.rejection.type = '';
            renderApp();
          });
        });

        app.querySelector('[data-refresh]')?.addEventListener('click', async (event) => {
          event.currentTarget.textContent = 'Refreshing';
          event.currentTarget.disabled = true;
          try {
            await loadPortalData();
            renderApp();
          } catch (error) {
            renderFatalError(error);
          }
        });

        app.querySelector('[data-sign-out]')?.addEventListener('click', async () => {
          await state.client.auth.signOut();
          window.location.href = authRedirects.login || 'login.html';
        });
      }

      async function handleCreateProjectSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.createProject.isSubmitting = true;
        state.createProject.message = '';
        state.createProject.type = '';
        renderApp();

        try {
          const body = {
            name: String(formData.get('name') || '').trim(),
            slug: String(formData.get('slug') || '').trim() || null,
            description: String(formData.get('description') || '').trim() || null
          };

          const { data, error } = await state.client.functions.invoke('create-project', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error creating project.');
          }

          await loadPortalData();
          state.activeView = 'projects';
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'success';
          state.createProject.message = data?.message || 'Project created';
          renderApp();
        } catch (error) {
          state.createProject.isOpen = true;
          state.createProject.isSubmitting = false;
          state.createProject.type = 'error';
          state.createProject.message = error instanceof Error ? error.message : 'Error creating project';
          renderApp();
        }
      }

      async function handleInviteSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.invite.isSubmitting = true;
        state.invite.message = '';
        state.invite.type = '';
        renderApp();

        try {
          const hourlyRateValue = String(formData.get('hourly_rate_usd') || '').trim();
          const body = {
            name: String(formData.get('name') || '').trim(),
            email: String(formData.get('email') || '').trim(),
            project_id: String(formData.get('project_id') || '').trim(),
            role: String(formData.get('role') || '').trim(),
            hourly_rate_usd: hourlyRateValue ? Number(hourlyRateValue) : null
          };

          const { data, error } = await state.client.functions.invoke('invite-member', { body });
          if (error) {
            throw new Error(data?.error || data?.message || error.message || 'Error sending invite.');
          }

          await loadPortalData();
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'success';
          state.invite.message = data?.message || 'Invite sent';
          renderApp();
        } catch (error) {
          try {
            await loadPortalData();
          } catch (_) {
            // Keep the original invite error visible if refresh fails.
          }
          state.invite.isOpen = true;
          state.invite.isSubmitting = false;
          state.invite.type = 'error';
          state.invite.message = error instanceof Error ? error.message : 'Error sending invite';
          renderApp();
        }
      }

      async function handleWorkLogSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);

        state.workLog.isSubmitting = true;
        state.workLog.message = '';
        state.workLog.type = '';
        renderApp();

        try {
          const projectId = String(formData.get('project_id') || '').trim();
          const project = state.projects.find((item) => item.id === projectId);
          const hours = Number(formData.get('hours_used'));

          if (!project) {
            throw new Error('Project is required.');
          }

          if (!Number.isFinite(hours) || hours <= 0 || hours > 24) {
            throw new Error('Hours must be greater than 0 and no more than 24.');
          }

          const payload = {
            company_id: project.company_id || null,
            project_id: project.id,
            worker_user_id: state.profile.id,
            created_by: state.profile.id,
            title: String(formData.get('title') || '').trim(),
            description: String(formData.get('description') || '').trim(),
            work_type: String(formData.get('work_type') || '').trim(),
            category: String(formData.get('work_type') || '').trim(),
            work_date: String(formData.get('work_date') || '').trim(),
            hours_used: hours,
            evidence_url: String(formData.get('evidence_url') || '').trim() || null,
            commit_hash: String(formData.get('commit_hash') || '').trim() || null,
            status: 'pending_approval',
            submitted_at: new Date().toISOString(),
            is_billable: true
          };

          if (!payload.title) {
            throw new Error('Title is required.');
          }

          if (!payload.description) {
            throw new Error('Description is required.');
          }

          const { error } = await state.client
            .from('work_logs')
            .insert(payload);

          if (error) {
            throw error;
          }

          await loadPortalData();
          state.activeView = 'workLogs';
          state.workLog.isOpen = true;
          state.workLog.isSubmitting = false;
          state.workLog.type = 'success';
          state.workLog.message = 'Work log submitted for approval.';
          renderApp();
        } catch (error) {
          state.workLog.isOpen = true;
          state.workLog.isSubmitting = false;
          state.workLog.type = 'error';
          state.workLog.message = error instanceof Error ? error.message : 'Error creating work log';
          renderApp();
        }
      }

      async function handleDeliverableSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const formData = new FormData(form);
        const deliverableId = state.deliverableEditor.deliverableId;
        const projectId = String(formData.get('project_id') || '').trim();
        const title = String(formData.get('title') || '').trim();
        const status = String(formData.get('status') || 'planned').trim();
        const responsibleUserId = String(formData.get('responsible_user_id') || '').trim() || null;

        state.deliverableEditor.isSubmitting = true;
        state.deliverableEditor.message = '';
        state.deliverableEditor.type = '';
        renderApp();

        try {
          if (!projectId) {
            throw new Error('Project is required.');
          }

          if (!title) {
            throw new Error('Title is required.');
          }

          const { error } = await state.client.rpc('upsert_project_deliverable', {
            p_project_id: projectId,
            p_title: title,
            p_description: String(formData.get('description') || '').trim() || null,
            p_responsible_user_id: responsibleUserId,
            p_due_date: String(formData.get('due_date') || '').trim() || null,
            p_status: status,
            p_figma_url: String(formData.get('figma_url') || '').trim() || null,
            p_google_drive_url: String(formData.get('google_drive_url') || '').trim() || null,
            p_document_url: String(formData.get('document_url') || '').trim() || null,
            p_evidence_url: String(formData.get('evidence_url') || '').trim() || null,
            p_deliverable_id: deliverableId || null
          });

          if (error) {
            throw error;
          }

          await loadPortalData();
          state.activeView = 'deliverables';
          state.deliverableEditor.isOpen = false;
          state.deliverableEditor.deliverableId = null;
          state.deliverableEditor.isSubmitting = false;
          renderApp();
        } catch (error) {
          state.deliverableEditor.isOpen = true;
          state.deliverableEditor.isSubmitting = false;
          state.deliverableEditor.type = 'error';
          state.deliverableEditor.message = error instanceof Error ? error.message : 'Error saving deliverable';
          renderApp();
        }
      }

      async function handleApproveWorkLogSubmit(event) {
        event.preventDefault();
        const formData = new FormData(event.currentTarget);
        const log = state.workLogs.find((item) => item.id === state.approval.logId);
        const approvedHours = Number(formData.get('approved_hours'));

        if (!log || !canReviewWorkLog(log)) {
          return;
        }

        if (!Number.isFinite(approvedHours) || approvedHours < 0 || approvedHours > toNumber(log.hours_used)) {
          state.approval.message = `Approved hours must be between 0 and ${formatHours(log.hours_used)}.`;
          state.approval.type = 'error';
          renderApp();
          return;
        }

        state.approval.isSubmitting = true;
        state.approval.message = '';
        state.approval.type = '';
        renderApp();

        await handleApproveWorkLog(log.id, approvedHours);
      }

      async function handleApproveWorkLog(logId, approvedHours) {
        const log = state.workLogs.find((item) => item.id === logId);
        if (!log || !canReviewWorkLog(log)) {
          return;
        }

        const { error } = await state.client
          .from('work_logs')
          .update({
            status: 'approved',
            approved_by: state.profile.id,
            approved_at: new Date().toISOString(),
            approved_hours: approvedHours,
            rejected_by: null,
            rejected_at: null,
            rejection_reason: null
          })
          .eq('id', log.id);

        if (error) {
          state.approval.isOpen = true;
          state.approval.logId = log.id;
          state.approval.isSubmitting = false;
          state.approval.type = 'error';
          state.approval.message = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        state.approval.isOpen = false;
        state.approval.logId = null;
        state.approval.isSubmitting = false;
        renderApp();
      }

      async function handleApproveDeliverable(deliverableId) {
        const deliverable = state.deliverables.find((item) => item.id === deliverableId);
        if (!deliverable || !canManageProject(deliverable.project_id)) {
          return;
        }

        const { error } = await state.client.rpc('approve_project_deliverable', {
          p_deliverable_id: deliverable.id
        });

        if (error) {
          state.deliverableEditor.isOpen = true;
          state.deliverableEditor.deliverableId = deliverable.id;
          state.deliverableEditor.type = 'error';
          state.deliverableEditor.message = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        renderApp();
      }

      async function handleMarkPaymentPaid(paymentKey) {
        const payment = findPayableRow(paymentKey);
        if (!payment || !canMarkPaymentPaid(payment)) {
          return;
        }

        const { error } = await state.client.rpc('mark_collaborator_payment_paid', {
          p_project_id: payment.project_id,
          p_user_id: payment.user_id,
          p_hourly_rate_usd: toNumber(payment.hourly_rate_usd),
          p_approved_hours: toNumber(payment.approved_hours),
          p_note: 'Marked as paid from Bastida OS'
        });

        if (error) {
          state.detail.isOpen = true;
          state.detail.kind = 'payment-error';
          state.detail.id = error.message;
          renderApp();
          return;
        }

        await loadPortalData();
        renderApp();
      }

      async function handleRejectSubmit(event) {
        event.preventDefault();
        const formData = new FormData(event.currentTarget);
        const reason = String(formData.get('rejection_reason') || '').trim();
        const log = state.workLogs.find((item) => item.id === state.rejection.logId);

        if (!log || !canReviewWorkLog(log)) {
          return;
        }

        if (!reason) {
          state.rejection.message = 'Rejection reason is required.';
          state.rejection.type = 'error';
          renderApp();
          return;
        }

        state.rejection.isSubmitting = true;
        state.rejection.message = '';
        state.rejection.type = '';
        renderApp();

        const { error } = await state.client
          .from('work_logs')
          .update({
            status: 'rejected',
            rejected_by: state.profile.id,
            rejected_at: new Date().toISOString(),
            rejection_reason: reason,
            approved_by: null,
            approved_at: null,
            approved_hours: null
          })
          .eq('id', log.id);

        if (error) {
          state.rejection.isSubmitting = false;
          state.rejection.message = error.message;
          state.rejection.type = 'error';
          renderApp();
          return;
        }

        await loadPortalData();
        state.rejection.isOpen = false;
        state.rejection.logId = null;
        state.rejection.isSubmitting = false;
        renderApp();
      }

      function setActiveView(view) {
        if (!viewLabels[view]) {
          return;
        }

        state.activeView = view;
        app.querySelectorAll('[data-nav]').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.nav === view);
        });
        app.querySelectorAll('[data-view]').forEach((section) => {
          section.classList.toggle('is-active', section.dataset.view === view);
        });
        const title = app.querySelector('[data-view-title]');
        if (title) {
          title.textContent = viewLabels[view];
        }
        const mobileNav = app.querySelector('[data-mobile-nav]');
        if (mobileNav) {
          mobileNav.value = view;
        }
      }

      function buildPeople() {
        const people = new Map();

        state.projectRoles.forEach((assignment) => {
          const member = assignment.member;
          const identity = member?.id || assignment.invite_email || assignment.id;
          if (!identity) {
            return;
          }

          if (!people.has(identity)) {
            people.set(identity, {
              id: identity,
              userId: member?.id || assignment.user_id || null,
              name: member?.full_name || assignment.invited_name || member?.email || assignment.invite_email || 'Invited member',
              email: member?.email || assignment.invite_email || '',
              platformRole: member?.platform_role || null,
              defaultRole: assignment.role,
              roles: [],
              projects: [],
              projectNames: [],
              assignments: [],
              status: normalizeInvitationStatus(assignment)
            });
          }

          const person = people.get(identity);
          person.assignments.push(assignment);
          if (assignment.role && !person.roles.includes(assignment.role)) {
            person.roles.push(assignment.role);
          }
          if (assignment.project?.id && !person.projects.includes(assignment.project.id)) {
            person.projects.push(assignment.project.id);
          }
          if (assignment.project?.name && !person.projectNames.includes(assignment.project.name)) {
            person.projectNames.push(assignment.project.name);
          }
          person.status = mergeInvitationStatus(person.status, normalizeInvitationStatus(assignment));
        });

        return Array.from(people.values())
          .map((person) => {
            const stats = buildCollaboratorStats(person.userId);
            return {
              ...person,
              headline: roleSummaryForAssignments(person.assignments, person),
              approvedHours: stats.approvedHours,
              totalEarned: stats.totalEarned,
              completedDeliverables: stats.completedDeliverables,
              lastActivity: stats.lastActivity
            };
          })
          .sort((a, b) => a.name.localeCompare(b.name));
      }
