      function renderDashboardPersonalQueue(overview) {
        const items = [
          ...overview.workLogs
            .filter((log) => log.status === 'pending_approval')
            .slice(0, 3)
            .map((log) => ({
              title: log.title || 'Pending Work Log',
              meta: `${log.project?.name || 'Unassigned'} - ${formatHours(log.hours_used)} submitted`,
              status: log.status
            })),
          ...overview.deliverables
            .filter((deliverable) => isOpenDeliverable(deliverable))
            .slice(0, 3)
            .map((deliverable) => ({
              title: deliverable.title,
              meta: `${deliverable.project?.name || 'Unassigned'} - due ${formatDate(deliverable.due_date)}`,
              status: deliverable.status
            })),
          ...overview.documents
            .filter((document) => document.status !== 'archived')
            .slice(0, 3)
            .map((document) => ({
              title: document.name,
              meta: `${documentProjectLabel(document)} - ${statusLabel(document.category)}`,
              status: document.status
            }))
        ].slice(0, 8);

        return items.length
          ? renderMiniList(items)
          : emptyState('No personal queue yet', 'Pending logs, deliverables, and active documents will appear here.', true);
      }

      function buildDashboardProjectRows(projects, payableRows, payments, workLogs, deliverables, documents, tasks, timeEntries, projectRoles) {
        return projects
          .map((project) => {
            const projectId = project.id;
            const projectLogs = workLogs.filter((log) => log.project_id === projectId);
            const projectPayments = payments.filter((payment) => payment.project_id === projectId);
            const projectPayableRows = payableRows.filter((payment) => payment.project_id === projectId);
            const projectDeliverables = deliverables.filter((deliverable) => deliverable.project_id === projectId);
            const projectDocuments = documents.filter((document) => document.status !== 'archived' && documentMatchesProjectContext(document, projectId));
            const projectTasks = tasks.filter((task) => task.project_id === projectId);
            const projectTimeEntries = timeEntries.filter((entry) => entry.project_id === projectId);
            const projectAssignments = projectRoles.filter((assignment) => assignment.project_id === projectId);
            const currentAssignment = currentUserAssignmentForProject(projectId);
            const role = isGlobalFounderOrAdmin() && !currentAssignment
              ? 'Founder'
              : roleLabel(currentAssignment?.role || 'member');
            const totalPayable = projectPayableRows.reduce((total, payment) => total + toNumber(payment.total_usd), 0);
            const totalPaid = projectPayments
              .filter((payment) => normalizePaymentStatus(payment.status) === 'paid')
              .reduce((total, payment) => total + toNumber(payment.total_usd), 0);
            const lastActivity = latestDateValue([
              ...projectLogs.map((log) => log.approved_at || log.submitted_at || log.work_date),
              ...projectDeliverables.map((deliverable) => deliverable.approved_at || deliverable.delivered_at || deliverable.updated_at || deliverable.created_at),
              ...projectDocuments.map((document) => document.archived_at || document.updated_at || document.created_at),
              ...projectTasks.map((task) => task.completed_at || task.updated_at || task.created_at),
              ...projectTimeEntries.map((entry) => entry.ended_at || entry.started_at || entry.updated_at || entry.created_at),
              ...projectPayments.map((payment) => payment.paid_at || payment.updated_at || payment.created_at),
              ...projectAssignments.map((assignment) => assignment.accepted_at || assignment.invited_at || assignment.joined_at)
            ]);

            return {
              projectId,
              projectName: project.name,
              status: project.status,
              role,
              projectTitle: currentAssignment?.project_title || '',
              approvedHours: projectLogs.reduce((total, log) => total + approvedHoursForLog(log), 0),
              totalPayable,
              totalPaid,
              pendingBalance: Math.max(0, totalPayable - totalPaid),
              openDeliverables: projectDeliverables.filter((deliverable) => isOpenDeliverable(deliverable)).length,
              completedDeliverables: projectDeliverables.filter((deliverable) => isCompletedDeliverable(deliverable)).length,
              documents: projectDocuments.length,
              workLogs: projectLogs.length,
              lastActivity
            };
          })
          .sort((a, b) => compareText(a.projectName, b.projectName));
      }

      function buildDashboardCollaboratorRows(managedProjectIds) {
        const assignments = visibleProjectRoles()
          .filter((assignment) => assignment.active !== false)
          .filter((assignment) => managedProjectIds.has(assignment.project_id))
          .sort(compareAssignmentsByHierarchy);
        const groups = new Map();

        assignments.forEach((assignment) => {
          const identity = assignment.member?.id || assignment.user_id || assignment.invite_email || assignment.id;
          if (!identity) {
            return;
          }

          if (!groups.has(identity)) {
            groups.set(identity, {
              id: identity,
              userId: assignment.member?.id || assignment.user_id || null,
              name: memberName(assignment),
              email: memberEmail(assignment),
              assignments: []
            });
          }

          groups.get(identity).assignments.push(assignment);
        });

        const managedLogs = visibleWorkLogs().filter((log) => managedProjectIds.has(log.project_id));
        const managedPayments = visiblePayments().filter((payment) => managedProjectIds.has(payment.project_id));
        const managedPayableRows = buildPayableRowsForData(managedLogs, managedPayments);

        return Array.from(groups.values())
          .map((person) => {
            const personLogs = managedLogs.filter((log) => log.worker_user_id === person.userId);
            const personPayments = managedPayments.filter((payment) => payment.user_id === person.userId);
            const personPayableRows = managedPayableRows.filter((payment) => payment.user_id === person.userId);
            const totalEarned = personPayableRows.reduce((total, payment) => total + toNumber(payment.total_usd), 0);
            const totalPaid = personPayments
              .filter((payment) => normalizePaymentStatus(payment.status) === 'paid')
              .reduce((total, payment) => total + toNumber(payment.total_usd), 0);
            const personDeliverables = visibleDeliverables()
              .filter((deliverable) => managedProjectIds.has(deliverable.project_id))
              .filter((deliverable) => deliverable.responsible_user_id === person.userId);
            const personDocuments = visibleDocuments()
              .filter((document) => (
                document.project_id
                  ? managedProjectIds.has(document.project_id)
                  : canManageRelatedUserDocument(document)
              ))
              .filter((document) => documentRelatedToPerson(document, person.userId));
            const lastActivity = latestDateValue([
              ...personLogs.map((log) => log.approved_at || log.submitted_at || log.work_date),
              ...personPayments.map((payment) => payment.paid_at || payment.updated_at || payment.created_at),
              ...personDeliverables.map((deliverable) => deliverable.approved_at || deliverable.delivered_at || deliverable.updated_at || deliverable.created_at),
              ...personDocuments.map((document) => document.archived_at || document.updated_at || document.created_at),
              ...person.assignments.map((assignment) => assignment.accepted_at || assignment.invited_at || assignment.joined_at)
            ]);

            return {
              ...person,
              platformRole: person.assignments[0]?.member?.platform_role || null,
              projectNames: uniqueValues(person.assignments.map((assignment) => assignment.project?.name).filter(Boolean)),
              projectsCount: uniqueValues(person.assignments.map((assignment) => assignment.project_id).filter(Boolean)).length,
              approvedHours: personLogs.reduce((total, log) => total + approvedHoursForLog(log), 0),
              totalEarned,
              totalPaid,
              pendingBalance: Math.max(0, totalEarned - totalPaid),
              lastActivity
            };
          })
          .sort((a, b) => compareText(a.name, b.name));
      }

      function dashboardWorkLogs() {
        return visibleWorkLogs().filter((log) => canViewDashboardRecord(log.project_id, log.worker_user_id));
      }

      function dashboardPayments() {
        return visiblePayments().filter((payment) => canViewDashboardRecord(payment.project_id, payment.user_id));
      }

      function dashboardPaymentHistory() {
        return visiblePaymentHistory().filter((history) => (
          canViewDashboardRecord(history.payment?.project_id, history.payment?.user_id)
        ));
      }

      function dashboardDeliverables() {
        return visibleDeliverables().filter((deliverable) => (
          canViewTeamDataForProject(deliverable.project_id)
          || deliverable.responsible_user_id === state.profile?.id
          || deliverable.created_by === state.profile?.id
        ));
      }

      function dashboardDocuments() {
        return visibleDocuments().filter((document) => (
          canViewDocumentTeamScope(document)
          || document.related_user_id === state.profile?.id
          || document.uploaded_by === state.profile?.id
        ));
      }

      function dashboardTasks() {
        return visibleTasks().filter((task) => (
          canViewTeamDataForProject(task.project_id)
          || task.assigned_to === state.profile?.id
          || task.created_by === state.profile?.id
        ));
      }

      function dashboardTimeEntries() {
        return visibleTimeEntries().filter((entry) => canViewDashboardRecord(entry.project_id, entry.user_id));
      }

      function dashboardProjectRoles() {
        return visibleProjectRoles().filter((assignment) => (
          canViewTeamDataForProject(assignment.project_id)
          || assignment.user_id === state.profile?.id
        ));
      }

      function canViewDashboardRecord(projectId, ownerUserId) {
        return canViewTeamDataForProject(projectId)
          || ownerUserId === state.profile?.id;
      }

      function canViewTeamDataForProject(projectId) {
        return Boolean(projectId) && canManageProject(projectId);
      }

      function canViewProjectScopedDocument(document) {
        if (!document?.project_id) {
          return false;
        }

        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        const scope = documentScopeValue(document);
        if (['project', 'company'].includes(scope)) {
          return true;
        }

        return canManageProject(document.project_id)
          || canManageRelatedUserDocument(document, document.project_id)
          || document.uploaded_by === state.profile?.id
          || document.related_user_id === state.profile?.id;
      }

      function canViewGeneralDocument(document, projectId = null) {
        if (!document || document.project_id) {
          return false;
        }

        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        if (document.uploaded_by === state.profile?.id || document.related_user_id === state.profile?.id) {
          return true;
        }

        return canManageRelatedUserDocument(document, projectId);
      }

      function canViewDocumentTeamScope(document) {
        if (!document) {
          return false;
        }

        if (document.project_id) {
          return canViewTeamDataForProject(document.project_id);
        }

        if (isGlobalFounderOrAdmin()) {
          return true;
        }

        return canManageRelatedUserDocument(document, activeWorkspaceProjectId());
      }

      function canManageRelatedUserDocument(document, projectId = null) {
        const relatedUserId = document?.related_user_id;
        if (!relatedUserId || !managerVisibleDocumentScopes().includes(documentScopeValue(document))) {
          return false;
        }

        const scopedProjectId = document.project_id || projectId || null;
        return state.projectRoles
          .filter((assignment) => assignment.active === true)
          .filter((assignment) => assignment.user_id === relatedUserId || assignment.member?.id === relatedUserId)
          .some((assignment) => (
            (!scopedProjectId || assignment.project_id === scopedProjectId)
            && canManageProject(assignment.project_id)
          ));
      }

      function documentRelatedToPerson(document, userId) {
        return Boolean(document && userId)
          && (
            document.uploaded_by === userId
            || document.related_user_id === userId
          );
      }

      function relatedUserAssignedToProject(userId, projectId) {
        return Boolean(userId && projectId)
          && state.projectRoles.some((assignment) => (
            assignment.active === true
            && assignment.project_id === projectId
            && (assignment.user_id === userId || assignment.member?.id === userId)
          ));
      }

      function documentMatchesProjectContext(document, projectId) {
        if (!document || !projectId) {
          return false;
        }

        if (document.project_id) {
          return document.project_id === projectId;
        }

        return Boolean(document.related_user_id)
          && relatedUserAssignedToProject(document.related_user_id, projectId);
      }

      function dashboardManagedProjectIds() {
        return new Set(
          visibleProjects()
            .filter((project) => canViewTeamDataForProject(project.id))
            .map((project) => project.id)
        );
      }

      function dashboardActiveCollaboratorCount(managedProjectIds) {
        if (!managedProjectIds.size) {
          return 0;
        }

        return uniqueValues(
          visibleProjectRoles()
            .filter((assignment) => managedProjectIds.has(assignment.project_id))
            .filter((assignment) => assignment.active !== false)
            .map((assignment) => assignment.member?.id || assignment.user_id)
            .filter(Boolean)
        ).length;
      }

      function currentUserAssignmentForProject(projectId) {
        return currentUserProjectAssignments()
          .filter((assignment) => assignment.project_id === projectId)
          .sort(compareAssignmentsByHierarchy)[0] || null;
      }

      function approvedHoursForLog(log) {
        if (!log || log.status !== 'approved') {
          return 0;
        }

        const hasApprovedHours = log.approved_hours !== null
          && typeof log.approved_hours !== 'undefined'
          && String(log.approved_hours) !== '';

        return hasApprovedHours ? toNumber(log.approved_hours) : toNumber(log.hours_used);
      }

      function buildPayableRowsForData(workLogs, payments) {
        const rows = new Map();

        workLogs
          .filter((log) => log.status === 'approved')
          .forEach((log) => {
            const approvedHours = approvedHoursForLog(log);
            if (approvedHours <= 0) {
              return;
            }

            const rate = findHourlyRate(log.project_id, log.worker_user_id);
            const key = `${log.project_id || 'no-project'}:${log.worker_user_id || 'no-user'}:${rate}`;

            if (!rows.has(key)) {
              rows.set(key, {
                key,
                project_id: log.project_id,
                user_id: log.worker_user_id,
                collaborator: log.worker || { full_name: 'Unknown', email: '' },
                project: log.project || { name: 'Unassigned' },
                hourly_rate_usd: rate,
                approved_hours: 0,
                total_usd: 0,
                status: 'pending',
                payment_status: 'pending',
                paid_at: null,
                payer: null,
                payment_id: null
              });
            }

            const row = rows.get(key);
            row.approved_hours += approvedHours;
            row.total_usd = row.approved_hours * rate;
          });

        rows.forEach((row) => {
          const record = findPaymentRecordFrom(payments, row.project_id, row.user_id, row.hourly_rate_usd);
          if (!record) {
            return;
          }

          const recordHours = toNumber(record.approved_hours);
          const hasNewApprovedHours = Math.abs(recordHours - toNumber(row.approved_hours)) > 0.009;
          const recordStatus = normalizePaymentStatus(record.status);

          row.payment_id = record.id;
          row.paid_at = record.paid_at;
          row.payer = record.payer;
          row.status = recordStatus;
          row.payment_status = recordStatus === 'paid' && hasNewApprovedHours ? 'pending' : recordStatus;
        });

        return Array.from(rows.values()).sort((a, b) => {
          const projectCompare = compareText(a.project?.name, b.project?.name);
          if (projectCompare !== 0) {
            return projectCompare;
          }
          return compareText(a.collaborator?.full_name || a.collaborator?.email, b.collaborator?.full_name || b.collaborator?.email);
        });
      }

      function findPaymentRecordFrom(payments, projectId, userId, hourlyRate) {
        return payments
          .filter((payment) => (
            payment.project_id === projectId
            && payment.user_id === userId
            && toNumber(payment.hourly_rate_usd) === toNumber(hourlyRate)
          ))
          .sort((a, b) => compareDateDesc(a.updated_at || a.created_at, b.updated_at || b.created_at))[0] || null;
      }

      function isOpenDeliverable(deliverable) {
        return ['planned', 'in_progress', 'delivered'].includes(String(deliverable?.status || '').toLowerCase());
      }

      function isCompletedDeliverable(deliverable) {
        return ['approved', 'completed'].includes(String(deliverable?.status || '').toLowerCase());
      }

      function buildDashboardActivityItems({ workLogs, deliverables, tasks, timeEntries, documents, paymentHistory, projectRoles, personalOnly = false }) {
        const activities = [];

        workLogs.forEach((log) => {
          activities.push({
            date: log.submitted_at || log.work_date,
            title: `${dashboardActorName(log.worker, 'Collaborator', personalOnly)} created Work Log`,
            meta: `${log.project?.name || 'Unassigned'} - ${log.title || 'Work log'}`
          });

          if (log.approved_at) {
            activities.push({
              date: log.approved_at,
              title: `${dashboardActorName(log.approver, 'Owner', personalOnly)} approved Work Log`,
              meta: `${log.project?.name || 'Unassigned'} - Approved ${formatHours(approvedHoursForLog(log))} of ${formatHours(log.hours_used)} hours`
            });
          }
        });

        deliverables.forEach((deliverable) => {
          activities.push({
            date: deliverable.created_at,
            title: `${dashboardActorName(deliverable.creator, 'Owner', personalOnly)} created Deliverable`,
            meta: `${deliverable.project?.name || 'Unassigned'} - ${deliverable.title}`
          });

          if (deliverable.approved_at) {
            activities.push({
              date: deliverable.approved_at,
              title: `${dashboardActorName(deliverable.approver, 'Owner', personalOnly)} approved Deliverable`,
              meta: `${deliverable.project?.name || 'Unassigned'} - ${deliverable.title}`
            });
          }
        });

        tasks.forEach((task) => {
          activities.push({
            date: task.created_at,
            title: `${dashboardActorName(task.creator, 'Owner', personalOnly)} created Task`,
            meta: `${task.project?.name || 'Unassigned'} - ${task.title}`
          });

          if (task.completed_at) {
            activities.push({
              date: task.completed_at,
              title: `${dashboardActorName(task.completer || task.assignee, 'Collaborator', personalOnly)} completed Task`,
              meta: `${task.project?.name || 'Unassigned'} - ${task.title}`
            });
          }
        });

        timeEntries.forEach((entry) => {
          activities.push({
            date: entry.started_at,
            title: `${dashboardActorName(entry.worker, 'Collaborator', personalOnly)} started Timer`,
            meta: `${entry.project?.name || 'Unassigned'}${entry.task?.title ? ` - ${entry.task.title}` : ''}`
          });

          if (entry.ended_at) {
            activities.push({
              date: entry.ended_at,
              title: `${dashboardActorName(entry.worker, 'Collaborator', personalOnly)} stopped Timer`,
              meta: `${entry.project?.name || 'Unassigned'} - ${formatDurationMinutes(timeEntryDurationMinutes(entry))}`
            });
          }
        });

        documents.forEach((document) => {
          activities.push({
            date: document.created_at,
            title: `${dashboardActorName(document.uploader, 'Collaborator', personalOnly)} uploaded Document`,
            meta: `${documentProjectLabel(document)} - ${document.name}`
          });

          if (document.archived_at) {
            activities.push({
              date: document.archived_at,
              title: `${dashboardActorName(document.archiver, 'Owner', personalOnly)} archived Document`,
              meta: `${documentProjectLabel(document)} - ${document.name}`
            });
          }
        });

        paymentHistory.forEach((history) => {
          if (normalizePaymentStatus(history.new_status) === 'paid') {
            activities.push({
              date: history.changed_at,
              title: `${dashboardActorName(history.actor, 'Founder', personalOnly)} marked payment as Paid`,
              meta: `${history.payment?.project?.name || 'Unassigned'} - ${history.payment?.collaborator?.full_name || history.payment?.collaborator?.email || 'Collaborator'}`
            });
          }
        });

        projectRoles.forEach((assignment) => {
          const inviteDate = assignment.invited_at || assignment.accepted_at || assignment.joined_at;
          if (!inviteDate || !isInvitationRecord(assignment)) {
            return;
          }

          activities.push({
            date: inviteDate,
            title: `${memberName(assignment)} invitation ${statusLabel(normalizeInvitationStatus(assignment))}`,
            meta: `${assignment.project?.name || 'Project'} - ${roleLabel(assignment.role)}`
          });
        });

        return activities
          .filter((activity) => activity.date)
          .sort((a, b) => compareDateDesc(a.date, b.date))
          .map((activity) => ({
            ...activity,
            meta: `${formatDate(activity.date)} - ${activity.meta}`
          }));
      }

        if (person?.id && person.id === state.profile?.id) {

        return fallback;

      function renderTableControls(tableKey, sortOptions, table) {
        const control = state.tables[tableKey];

        return `
          <div class="table-controls">
            <div class="table-control-group">

                <select data-table-sort="${escapeAttr(tableKey)}">

                </select>
              </label>
            </div>
            <div class="table-pagination">
              <span>Showing ${from}-${to} of ${table.total}</span>
              <button class="page-button" type="button" data-table-page="${escapeAttr(tableKey)}" data-page-value="${table.page - 1}" ${table.page <= 1 ? 'disabled' : ''} title="Previous page">‹</button>
              <span>Page ${table.page} / ${table.pageCount}</span>
              <button class="page-button" type="button" data-table-page="${escapeAttr(tableKey)}" data-page-value="${table.page + 1}" ${table.page >= table.pageCount ? 'disabled' : ''} title="Next page">›</button>
            </div>
          </div>
        `;
      }

      function renderDocumentFilterControls(documents) {
        const control = state.tables.documents;
        const projects = uniqueDocumentsByKey(
          documents
            .filter((document) => document.project_id)
            .map((document) => ({
              value: document.project_id,
              label: document.project?.name || 'Project'
            }))
        );
        const collaborators = uniqueDocumentsByKey(
          documents
            .filter((document) => document.related_user_id)
            .map((document) => ({
              value: document.related_user_id,
              label: documentRelatedUserLabel(document)
            }))
        );
        const categories = uniqueValues(documents.map((document) => document.category).filter(Boolean));
        const statuses = uniqueValues(documents.map((document) => document.status).filter(Boolean));

        return `
          <div class="table-controls">
            <div class="table-control-group">
              ${renderDocumentFilterSelect('scope', 'Scope', [
                ['all', 'All Scopes'],
                ...documentScopeOptions().map((option) => [option.value, option.label])
              ], control.scope)}
              ${renderDocumentFilterSelect('project', 'Project', [
                ['all', 'All Projects'],
                ['general', 'Bastida Systems'],
                ...projects.map((project) => [project.value, project.label])
              ], control.project)}
              ${renderDocumentFilterSelect('collaborator', 'Collaborator', [
                ['all', 'All Collaborators'],
                ...collaborators.map((person) => [person.value, person.label])
              ], control.collaborator)}
              ${renderDocumentFilterSelect('category', 'Category', [
                ['all', 'All Categories'],
                ...categories.map((category) => [category, statusLabel(category)])
              ], control.category)}
              ${renderDocumentFilterSelect('status', 'Status', [
                ['all', 'All Statuses'],
                ...statuses.map((status) => [status, statusLabel(status)])
              ], control.status)}
            </div>
          </div>
        `;
      }

      function renderDocumentFilterSelect(key, label, options, selectedValue) {
        return `
          <label class="table-filter">
            <span>${escapeHtml(label)}</span>
            <select data-document-filter="${escapeAttr(key)}">
              ${options.map(([value, optionLabel]) => `<option value="${escapeAttr(value)}" ${String(selectedValue || 'all') === String(value) ? 'selected' : ''}>${escapeHtml(optionLabel)}</option>`).join('')}
            </select>
          </label>
        `;
      }

      function uniqueDocumentsByKey(items) {
        const byValue = new Map();
        items.forEach((item) => {
          if (!item.value || byValue.has(item.value)) {
            return;
          }
          byValue.set(item.value, item);
        });

        return Array.from(byValue.values()).sort((a, b) => compareText(a.label, b.label));
      }

      function filterDocumentsByControls(documents) {
        const control = state.tables.documents;

        return documents.filter((document) => {
          const scope = documentScopeValue(document);
          if (control.scope !== 'all' && scope !== control.scope) {
            return false;
          }

          if (control.project === 'general' && document.project_id) {
            return false;
          }

          if (control.project !== 'all' && control.project !== 'general' && document.project_id !== control.project) {
            return false;
          }

          if (control.collaborator !== 'all' && document.related_user_id !== control.collaborator) {
            return false;
          }

          if (control.category !== 'all' && document.category !== control.category) {
            return false;
          }

          if (control.status !== 'all' && document.status !== control.status) {
            return false;
          }

          return true;
        });
      }

      function prepareTableRows(tableKey, rows, getSearchText, sorters) {
        const control = state.tables[tableKey];
        const filter = String(control.filter || '').trim().toLowerCase();
        const sorter = sorters[control.sort] || Object.values(sorters)[0];
        const filteredRows = filter
          ? rows.filter((row) => getSearchText(row).toLowerCase().includes(filter))
          : rows.slice();

        filteredRows.sort(sorter);

        const pageCount = Math.max(1, Math.ceil(filteredRows.length / TABLE_PAGE_SIZE));
        control.page = Math.min(Math.max(1, Number(control.page) || 1), pageCount);

        const start = (control.page - 1) * TABLE_PAGE_SIZE;
        return {
          rows: filteredRows.slice(start, start + TABLE_PAGE_SIZE),
          total: filteredRows.length,
          page: control.page,
          pageCount,
          start
        };
      }

      function renderProgressBar(value) {
        const progress = Math.min(100, Math.max(0, Number(value) || 0));
        return `
          <div class="progress-wrap" title="${progress}%">
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" style="width:${progress}%"></div>
            </div>
            <span class="progress-label">${progress}%</span>
          </div>
        `;
      }

      function deliverableProgress(status) {
        const values = {
          planned: 15,
          in_progress: 50,
          delivered: 75,
          approved: 100,
          archived: 100
        };

        return values[String(status || '').toLowerCase()] ?? 0;
      }

      function renderPaymentTimeline(payment, history) {
        const items = history.length
          ? history
            .slice()
            .sort((a, b) => compareDateAsc(a.changed_at, b.changed_at))
            .map((item) => ({
              title: statusLabel(item.new_status),
              meta: `${formatDate(item.changed_at)} - ${personDisplayName(item.actor) || 'Founder'}${item.note ? ` - ${item.note}` : ''}`
            }))
          : [{
            title: statusLabel(payment.payment_status || payment.status),
            meta: payment.paid_at ? `Paid ${formatDate(payment.paid_at)}` : 'No payment history has been recorded yet.'
          }];

        return `
          <ol class="payment-timeline">
            ${items.map((item) => `
              <li class="payment-timeline-item">
                <span class="activity-dot" aria-hidden="true"></span>
                <div>
                  <p class="activity-title">${escapeHtml(item.title)}</p>
                  <p class="activity-meta">${escapeHtml(item.meta)}</p>
                </div>
              </li>
            `).join('')}
          </ol>
        `;
      }

      function buildCollaboratorActivity(person) {
        if (!person.userId) {
          return [];
        }

        const activities = [];

        visibleWorkLogs()
          .filter((log) => log.worker_user_id === person.userId)
          .forEach((log) => {
            activities.push({
              date: log.submitted_at || log.work_date,
              title: 'Created Work Log',
              meta: `${formatDate(log.submitted_at || log.work_date)} - ${log.project?.name || 'Unassigned'} - ${log.title || 'Work log'}`,
              status: log.status
            });

            if (log.approved_at) {
              activities.push({
                date: log.approved_at,
                title: 'Work Log Approved',
                meta: `${formatDate(log.approved_at)} - ${formatHours(log.approved_hours)} approved hours`,
                status: log.status
              });
            }
          });

        visibleDeliverables()
          .filter((deliverable) => deliverable.responsible_user_id === person.userId)
          .forEach((deliverable) => {
            activities.push({
              date: deliverable.updated_at || deliverable.created_at,
              title: 'Deliverable Activity',
              meta: `${formatDate(deliverable.updated_at || deliverable.created_at)} - ${deliverable.project?.name || 'Unassigned'} - ${deliverable.title}`,
              status: deliverable.status
            });
          });

        visibleTasks()
          .filter((task) => task.assigned_to === person.userId)
          .forEach((task) => {
            activities.push({
              date: task.completed_at || task.updated_at || task.created_at,
              title: task.status === 'done' ? 'Task Completed' : 'Task Activity',
              meta: `${formatDate(task.completed_at || task.updated_at || task.created_at)} - ${task.project?.name || 'Unassigned'} - ${task.title}`,
              status: task.status
            });
          });

        visibleTimeEntries()
          .filter((entry) => entry.user_id === person.userId)

              status: entry.status

        visibleDocuments()
          .filter((document) => documentRelatedToPerson(document, person.userId))
          .forEach((document) => {
            activities.push({
              date: document.archived_at || document.updated_at || document.created_at,
              title: 'Document Activity',
              meta: `${formatDate(document.archived_at || document.updated_at || document.created_at)} - ${documentProjectLabel(document)} - ${document.name}`,
              status: document.status

        buildPayableRows()
          .filter((payment) => payment.user_id === person.userId)

            activities.push({

              title: 'Payment Status',
              meta: `${payment.project?.name || 'Unassigned'} - ${formatMoney(payment.total_usd)}`,
              status: payment.payment_status || payment.status
            });
          });

        return activities
          .filter((activity) => activity.date)
          .sort((a, b) => compareDateDesc(a.date, b.date))
          .map(({ date, ...activity }) => activity);
      }

      function personSearchText(person) {

      function renderOrganizationTree(projects) {
        const zoom = state.organization.zoom || 1;
        const layout = buildOrganizationTreeLayout(projects);
        const zoomLabel = `${Math.round(zoom * 100)}%`;

        return `
          <div class="org-board">
            <div class="org-toolbar">
              <div class="org-toolbar-group" aria-label="Organization tree controls">
                <button class="button button-small" type="button" data-org-zoom="out" title="Zoom Out">-</button>
                <span class="org-zoom-label">${escapeHtml(zoomLabel)}</span>
                <button class="button button-small" type="button" data-org-zoom="in" title="Zoom In">+</button>
                <button class="button button-small" type="button" data-org-fit="screen">Fit to Screen</button>
                <button class="button button-small" type="button" data-org-fit="reset">Reset</button>
              </div>
              <div class="org-toolbar-group">
                <button class="button button-small" type="button" data-org-toggle-all="expand">Expand All</button>
                <button class="button button-small" type="button" data-org-toggle-all="collapse">Collapse All</button>
              </div>
            </div>
            <div class="org-canvas" aria-label="Bastida Systems organization tree">
              <div class="org-scale-shell" style="width:${layout.width * zoom}px; height:${layout.height * zoom}px;">
                <div class="org-canvas-inner" style="width:${layout.width}px; height:${layout.height}px; transform: scale(${zoom});">
                  <svg class="org-connector-layer" width="${layout.width}" height="${layout.height}" viewBox="0 0 ${layout.width} ${layout.height}" aria-hidden="true">
                    ${layout.paths.map((path) => `<path class="org-connector" d="${escapeAttr(path)}"></path>`).join('')}
                  </svg>
                  ${layout.nodes.map((node) => renderOrgTreeNode(node)).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function buildOrganizationTreeLayout(projects) {
        const hierarchy = buildOrganizationHierarchy(projects);
        const collapsed = new Set(state.organization.collapsedNodeIds);
        const nodeWidth = 292;
        const nodeHeight = 128;
        const margin = 52;
        const levelGap = 104;
        const columnGap = 44;
        const paths = [];
        const nodes = [];
        let maxDepth = 0;

        function visibleChildren(node) {
          return collapsed.has(node.id) ? [] : (node.children || []);
        }

        function measure(node) {
          const children = visibleChildren(node);

          if (!children.length) {
            node.subtreeWidth = nodeWidth;
            return node.subtreeWidth;
          }

          const childWidth = children.reduce((total, child, index) => (
            total + measure(child) + (index === 0 ? 0 : columnGap)
          ), 0);

          node.subtreeWidth = Math.max(nodeWidth, childWidth);
          return node.subtreeWidth;
        }

        function place(node, depth, left) {
          const x = Math.round(left + ((node.subtreeWidth - nodeWidth) / 2));
          const y = margin + depth * (nodeHeight + levelGap);
          const children = visibleChildren(node);
          const layoutNode = {
            ...node,
            x,
            y,
            width: nodeWidth,
            height: nodeHeight,
            collapsed: collapsed.has(node.id),
            childCount: (node.children || []).length
          };

          nodes.push(layoutNode);
          maxDepth = Math.max(maxDepth, depth);

          let cursorX = left;
          children.forEach((child) => {
            const childX = place(child, depth + 1, cursorX);
            paths.push(curvePath(
              x + nodeWidth / 2,
              y + nodeHeight,
              childX + nodeWidth / 2,
              margin + (depth + 1) * (nodeHeight + levelGap)
            ));
            cursorX += child.subtreeWidth + columnGap;
          });

          return x;
        }

        const measuredWidth = measure(hierarchy.root);
        const width = Math.max(980, measuredWidth + margin * 2);
        const startLeft = margin + Math.max(0, (width - margin * 2 - measuredWidth) / 2);
        place(hierarchy.root, 0, startLeft);
        const height = Math.max(620, margin * 2 + (maxDepth + 1) * nodeHeight + maxDepth * levelGap);

        return {
          width,
          height,
          nodes,
          paths
        };
      }

      function buildOrganizationHierarchy(projects) {
        const projectMap = new Map(projects.map((project) => [project.id, project]));
        const assignments = visibleProjectRoles()
          .filter((assignment) => assignment.active === true)
          .filter((assignment) => projectMap.has(assignment.project_id))
          .filter((assignment) => assignment.user_id || assignment.member || assignment.invited_name || assignment.invite_email);
        const root = {
          id: 'org-root',
          kind: 'root',
          role: 'root',
          name: 'Bastida Systems',
          roleText: 'Organization',
          projectLabel: `${projects.length} ${projects.length === 1 ? 'Project' : 'Projects'}`,
          approvedHours: null,
          totalEarned: null,
          children: []
        };
        const founderAssignments = assignments.filter(isFounderAssignment);
        const founderNodes = groupAssignmentsByPerson(founderAssignments)
          .map((group) => createFounderOrgNode(group.assignments, projectMap))
          .sort(compareOrgNodes);
        if (!founderNodes.length && isGlobalFounderOrAdmin() && state.profile?.id) {
          founderNodes.push(createGlobalFounderOrgNode(projects));
        }
        const founderByProject = new Map();

        founderNodes.forEach((node) => {
          root.children.push(node);
          node.assignments.forEach((assignment) => {
            if (!founderByProject.has(assignment.project_id)) {
              founderByProject.set(assignment.project_id, node);
            }
          });
        });

        const fallbackParent = founderNodes[0] || root;
        const ownerNodesByProject = new Map();

        assignments
          .filter((assignment) => assignment.role === 'owner')
          .sort(compareAssignmentsByHierarchy)
          .forEach((assignment) => {
            const project = projectMap.get(assignment.project_id);
            const node = createAssignmentOrgNode(assignment, project);
            const parent = founderByProject.get(assignment.project_id) || fallbackParent;

            parent.children.push(node);

            if (!ownerNodesByProject.has(assignment.project_id)) {
              ownerNodesByProject.set(assignment.project_id, []);
            }
            ownerNodesByProject.get(assignment.project_id).push(node);
          });

        const unassignedProjectNodes = new Map();
        const getUnassignedProjectNode = (project) => {
          if (!unassignedProjectNodes.has(project.id)) {
            const node = createUnassignedProjectNode(project);
            const parent = founderByProject.get(project.id) || fallbackParent;
            parent.children.push(node);
            unassignedProjectNodes.set(project.id, node);
          }

          return unassignedProjectNodes.get(project.id);
        };

        assignments
          .filter((assignment) => !['founder', 'owner'].includes(assignment.role))
          .sort(compareAssignmentsByHierarchy)
          .forEach((assignment) => {
            const project = projectMap.get(assignment.project_id);
            const owners = ownerNodesByProject.get(assignment.project_id) || [];
            const parent = owners[0] || getUnassignedProjectNode(project);

            parent.children.push(createAssignmentOrgNode(assignment, project));
          });

        sortOrgTree(root);

        return { root };
      }

      function renderOrgTreeNode(node) {
        const safeRole = escapeAttr(node.role);
        const hasChildren = node.childCount > 0;
        const canOpenProfile = Boolean(node.userId);
        const mainTag = canOpenProfile ? 'button' : 'div';
        const profileAttrs = canOpenProfile
          ? `type="button" data-detail-kind="collaborator" data-detail-id="${escapeAttr(node.userId)}" title="Open ${escapeAttr(node.name)} profile"`
          : '';

        return `
          <article class="org-node ${node.kind === 'root' ? 'org-root-node' : 'org-person-node'} org-role-${safeRole}" style="left:${node.x}px; top:${node.y}px;">
            ${hasChildren ? `<button class="org-node-toggle" type="button" data-org-toggle-node="${escapeAttr(node.id)}" title="${node.collapsed ? 'Expand node' : 'Collapse node'}">${node.collapsed ? '+' : '-'}</button>` : ''}
            <${mainTag} class="org-node-main" ${profileAttrs}>
              <span class="org-node-avatar ${node.kind === 'root' ? 'org-avatar-brand' : ''}">${escapeHtml(node.avatar || initials(node.name))}</span>
              <div class="org-node-body">
                <p class="org-node-title" title="${escapeAttr(node.name)}">${escapeHtml(node.name)}</p>
                <p class="org-node-role">${escapeHtml(node.roleText)}</p>
                <p class="org-node-project" title="${escapeAttr(node.projectLabel || '')}">${escapeHtml(node.projectLabel || '')}</p>
                ${node.projectTitle ? `<p class="org-node-position" title="${escapeAttr(node.projectTitle)}">${escapeHtml(node.projectTitle)}</p>` : ''}
                ${renderOrgNodeMetrics(node)}
              </div>
            </${mainTag}>
          </article>
        `;
      }

      function renderOrgNodeMetrics(node) {
        if (node.kind === 'root' || node.kind === 'unassigned') {
          return '';
        }

        return `
          <div class="org-node-metrics">
            <span class="org-node-metric">${formatHours(node.approvedHours)}h approved</span>
            <span class="org-node-metric">${formatMoney(node.totalEarned)} earned</span>
          </div>
        `;
      }

      function curvePath(fromX, fromY, toX, toY) {
        const middle = Math.max(54, Math.round((toY - fromY) / 2));
        return `M ${fromX} ${fromY} C ${fromX} ${fromY + middle}, ${toX} ${toY - middle}, ${toX} ${toY}`;
      }

      function compareAssignmentsByHierarchy(a, b) {
        const order = {
          founder: 0,
          owner: 1,
          core_collaborator: 2,
          designer: 3,
          developer: 4,
          contractor: 5
        };
        const roleCompare = (order[a.role] ?? 9) - (order[b.role] ?? 9);
        if (roleCompare !== 0) {
          return roleCompare;
        }

        return compareText(memberName(a), memberName(b));
      }

      function isFounderAssignment(assignment) {
        return assignment.role === 'founder'
          || assignment.member?.platform_role === 'founder'
          || (
            assignment.user_id === state.profile?.id
            && state.profile?.platform_role === 'founder'
          );
      }

      function groupAssignmentsByPerson(assignments) {
        const groups = new Map();

        assignments.forEach((assignment) => {
          const identity = assignment.member?.id
            || assignment.user_id
            || assignment.invite_email
            || assignment.id;

          if (!groups.has(identity)) {
            groups.set(identity, {
              identity,
              assignments: []
            });
          }

          groups.get(identity).assignments.push(assignment);
        });

        return Array.from(groups.values());
      }

      function createFounderOrgNode(assignments, projectMap) {
        const primary = assignments[0];
        const userId = primary.member?.id || primary.user_id || null;
        const projectNames = uniqueValues(
          assignments
            .map((assignment) => projectMap.get(assignment.project_id)?.name || assignment.project?.name)
            .filter(Boolean)
        );
        const stats = buildOrgNodeStats(userId, null);

        return {
          id: `founder:${userId || primary.invite_email || primary.id}`,
          kind: 'person',
          role: 'founder',
          name: memberName(primary),
          email: memberEmail(primary),
          userId,
          avatar: initials(memberName(primary)),
          roleText: roleLabel('founder'),
          projectLabel: projectNames.length > 1
            ? `${projectNames.length} Projects`
            : (projectNames[0] || 'Bastida Systems'),
          projectTitle: assignments.length === 1 ? (assignments[0].project_title || '') : '',
          approvedHours: stats.approvedHours,
          totalEarned: stats.totalEarned,
          assignments,
          children: []
        };
      }

      function createGlobalFounderOrgNode(projects) {
        const userId = state.profile?.id || null;
        const projectNames = projects.map((project) => project.name).filter(Boolean);
        const stats = buildOrgNodeStats(userId, null);
        const name = state.profile?.full_name || state.profile?.email || 'Founder';

        return {
          id: `founder:${userId || 'global'}`,
          kind: 'person',
          role: 'founder',
          name,
          email: state.profile?.email || '',
          userId,
          avatar: initials(name),
          roleText: roleLabel('founder'),
          projectLabel: projectNames.length > 1
            ? `${projectNames.length} Projects`
            : (projectNames[0] || 'Bastida Systems'),
          approvedHours: stats.approvedHours,
          totalEarned: stats.totalEarned,
          assignments: [],
          children: []
        };
      }

      function createAssignmentOrgNode(assignment, project) {
        const userId = assignment.member?.id || assignment.user_id || null;
        const stats = buildOrgNodeStats(userId, assignment.project_id);

        return {
          id: `assignment:${assignment.project_id}:${assignment.role}:${userId || assignment.invite_email || assignment.id}`,
          kind: 'person',
          role: assignment.role,
          name: memberName(assignment),
          email: memberEmail(assignment),
          userId,
          avatar: initials(memberName(assignment) || memberEmail(assignment)),
          roleText: roleLabel(assignment.role),
          projectLabel: project?.name || assignment.project?.name || 'Project',
          projectTitle: assignment.project_title || '',
          approvedHours: stats.approvedHours,
          totalEarned: stats.totalEarned,
          assignment,
          children: []
        };
      }

      function createUnassignedProjectNode(project) {
        return {
          id: `unassigned:${project.id}`,
          kind: 'unassigned',
          role: 'unassigned_project',
          name: 'Unassigned Project',
          userId: null,
          avatar: initials(project.name),
          roleText: 'Missing Owner',
          projectLabel: project.name,
          approvedHours: null,
          totalEarned: null,
          children: []
        };
      }

      function buildOrgNodeStats(userId, projectId = null) {
        if (!userId) {
          return {
            approvedHours: 0,
            totalEarned: 0
          };
        }

        const logs = state.workLogs.filter((log) => (
          log.worker_user_id === userId
          && log.status === 'approved'
          && (!projectId || log.project_id === projectId)
        ));

        return logs.reduce((stats, log) => {
          const approvedHours = toNumber(log.approved_hours);
          stats.approvedHours += approvedHours;
          stats.totalEarned += approvedHours * findHourlyRate(log.project_id, log.worker_user_id);
          return stats;
        }, {
          approvedHours: 0,
          totalEarned: 0
        });
      }

      function sortOrgTree(node) {
        node.children = (node.children || []).sort(compareOrgNodes);
        node.children.forEach(sortOrgTree);
      }

      function compareOrgNodes(a, b) {
        const order = {
          founder: 0,
          owner: 1,
          unassigned_project: 2,
          core_collaborator: 3,
          designer: 4,
          developer: 5,
          contractor: 6,
          root: 9
        };
        const roleCompare = (order[a.role] ?? 8) - (order[b.role] ?? 8);
        if (roleCompare !== 0) {
          return roleCompare;
        }

        const projectCompare = compareText(a.projectLabel, b.projectLabel);
        if (projectCompare !== 0) {
          return projectCompare;
        }

        return compareText(a.name, b.name);
      }

      function collectCollapsibleOrgNodeIds(node) {
        const ids = [];

        if ((node.children || []).length) {
          ids.push(node.id);
        }

        (node.children || []).forEach((child) => {
          ids.push(...collectCollapsibleOrgNodeIds(child));
        });

        return ids;
      }

      function buildPeople() {
        const people = new Map();

        visibleProjectRoles().forEach((assignment) => {
          const member = assignment.member;
          const identity = member?.id || assignment.invite_email || assignment.id;
          if (!identity) {
            return;
          }

          if (!people.has(identity)) {
            people.set(identity, {
              id: identity,
              userId: member?.id || assignment.user_id || null,
              name: member?.full_name || assignment.invited_name || member?.email || assignment.invite_email || 'Invited member',
              email: member?.email || assignment.invite_email || '',
              platformRole: member?.platform_role || null,
              defaultRole: assignment.role,
              roles: [],
              projects: [],
              projectNames: [],
              assignments: [],
              status: normalizeInvitationStatus(assignment)
            });
          }

          const person = people.get(identity);
          person.assignments.push(assignment);
          if (assignment.role && !person.roles.includes(assignment.role)) {
            person.roles.push(assignment.role);
          }
          if (assignment.project?.id && !person.projects.includes(assignment.project.id)) {
            person.projects.push(assignment.project.id);
          }
          if (assignment.project?.name && !person.projectNames.includes(assignment.project.name)) {
            person.projectNames.push(assignment.project.name);
          }
          person.status = mergeInvitationStatus(person.status, normalizeInvitationStatus(assignment));
        });

        if (isGlobalFounderOrAdmin() && state.profile?.id && !people.has(state.profile.id)) {
          const projects = visibleProjects();
          people.set(state.profile.id, {
            id: state.profile.id,
            userId: state.profile.id,
            name: state.profile.full_name || state.profile.email || 'Founder',
            email: state.profile.email || '',
            platformRole: state.profile.platform_role,
            defaultRole: 'founder',
            roles: ['founder'],
            projects: projects.map((project) => project.id),
            projectNames: projects.map((project) => project.name),
            assignments: [],
            status: 'active_member'
          });
        }

        return Array.from(people.values())
          .map((person) => {
            const stats = buildCollaboratorStats(person.userId);
            return {
              ...person,
              headline: roleSummaryForAssignments(person.assignments, person),
              approvedHours: stats.approvedHours,
              totalEarned: stats.totalEarned,
              completedDeliverables: stats.completedDeliverables,
              completedTasks: stats.completedTasks,
              lastActivity: stats.lastActivity
            };
          })
          .sort((a, b) => a.name.localeCompare(b.name));
      }

      function allActiveAssignmentsForPerson(person) {
        if (!person) {
          return [];
        }

        return state.projectRoles
          .filter((assignment) => assignment.active !== false)
          .filter((assignment) => {
            const assignmentUserId = assignment.member?.id || assignment.user_id;
            const assignmentIdentity = assignmentUserId || assignment.invite_email || assignment.id;

            return (
              (person.userId && assignmentUserId === person.userId)
              || (!person.userId && assignmentIdentity === person.id)
            );
          })
          .sort(compareAssignmentsByHierarchy);
      }

      function renderProjectActions() {
        if (!canCreateProjects()) {
          return '';
        }

        return '<button class="button button-primary" type="button" data-open-create-project>+ Create Project</button>';
      }

      function renderPeopleActions() {
        if (!canInviteMembers()) {
          return '';
        }

        return '<button class="button button-primary" type="button" data-open-invite>+ Invite Collaborator</button>';
      }

                  <button class="button" type="button" data-close-invite>Cancel</button>
